<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>低位株TRADE</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a; --surface: #111827; --surface2: #1a2234;
  --border: #2a3a52; --accent: #00d4ff; --accent2: #00ff9f;
  --warn: #ff6b6b; --gold: #ffd700; --text: #e8f0fe; --muted: #7a8ba0;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; padding-bottom: 80px; }

.header { background: #0f1c35; border-bottom: 1px solid var(–border); padding: 14px 16px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
.app-title { font-size: 18px; font-weight: 900; } .app-title span { color: var(–accent); }
.date-badge { background: var(–surface2); border: 1px solid var(–border); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: var(–muted); font-family: ‘JetBrains Mono’, monospace; }

.page { display: none; padding: 12px; }
.page.active { display: block; }

.card { background: var(–surface); border: 1px solid var(–border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.card-title { font-size: 11px; font-weight: 700; color: var(–accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.form-group { margin-bottom: 10px; }
label { display: block; font-size: 11px; color: var(–muted); font-weight: 700; margin-bottom: 4px; }
input, select, textarea { width: 100%; background: var(–surface2); border: 1.5px solid var(–border); border-radius: 10px; padding: 11px 12px; color: var(–text); font-size: 16px; font-family: ‘JetBrains Mono’, monospace; -webkit-appearance: none; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(–accent); }
textarea { font-family: ‘Noto Sans JP’, sans-serif; font-size: 13px; min-height: 80px; resize: none; line-height: 1.6; }

.score-display { background: var(–surface2); border-radius: 14px; padding: 16px; text-align: center; border: 2px solid var(–border); margin-bottom: 12px; }
.score-num { font-size: 60px; font-weight: 900; font-family: ‘JetBrains Mono’, monospace; line-height: 1; }
.score-num.s0, .score-num.s1 { color: var(–warn); }
.score-num.s2 { color: var(–gold); }
.score-num.s3, .score-num.s4 { color: var(–accent2); }
.score-verdict { font-size: 13px; font-weight: 700; margin-top: 6px; }

.price-boxes { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.price-box { border-radius: 10px; padding: 10px 6px; text-align: center; border: 1.5px solid; }
.price-box.entry { background: rgba(0,212,255,0.08); border-color: rgba(0,212,255,0.3); }
.price-box.profit { background: rgba(0,255,159,0.08); border-color: rgba(0,255,159,0.3); }
.price-box.loss { background: rgba(255,107,107,0.08); border-color: rgba(255,107,107,0.3); }
.price-box-label { font-size: 9px; color: var(–muted); font-weight: 700; margin-bottom: 3px; }
.price-box-value { font-size: 18px; font-weight: 900; font-family: ‘JetBrains Mono’, monospace; }
.price-box.entry .price-box-value { color: var(–accent); }
.price-box.profit .price-box-value { color: var(–accent2); }
.price-box.loss .price-box-value { color: var(–warn); }
.price-box-sub { font-size: 9px; color: var(–muted); margin-top: 2px; }

.flags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.flag { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; border: 1.5px solid; }
.flag.on { background: rgba(0,255,159,0.1); border-color: rgba(0,255,159,0.4); color: var(–accent2); }
.flag.off { background: rgba(122,139,160,0.05); border-color: rgba(122,139,160,0.15); color: var(–muted); }
.flag.excluded { background: rgba(255,107,107,0.1); border-color: rgba(255,107,107,0.4); color: var(–warn); }

.btn-primary { width: 100%; background: linear-gradient(135deg, var(–accent), #0099cc); color: #000; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 900; cursor: pointer; margin-bottom: 8px; }
.btn-secondary { width: 100%; background: transparent; color: var(–accent); border: 1.5px solid var(–accent); border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-warn { width: 100%; background: transparent; color: var(–warn); border: 1.5px solid var(–warn); border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; }
.btn-ai { width: 100%; background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; border: none; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 900; cursor: pointer; margin-bottom: 8px; letter-spacing: 0.05em; }
.btn-ai:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-material { width: 100%; background: linear-gradient(135deg, #d97706, #b45309); color: #fff; border: none; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 900; cursor: pointer; margin-bottom: 8px; }
.btn-material:disabled { opacity: 0.5; cursor: not-allowed; }

.record-item { background: var(–surface); border: 1px solid var(–border); border-radius: 12px; padding: 12px; margin-bottom: 8px; }
.record-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.record-code { font-size: 18px; font-weight: 900; font-family: ‘JetBrains Mono’, monospace; }
.record-name { font-size: 11px; color: var(–muted); }
.score-badge { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; font-family: ‘JetBrains Mono’, monospace; flex-shrink: 0; }
.score-badge.s0, .score-badge.s1 { background: rgba(255,107,107,0.15); color: var(–warn); border: 1.5px solid rgba(255,107,107,0.3); }
.score-badge.s2 { background: rgba(255,215,0,0.15); color: var(–gold); border: 1.5px solid rgba(255,215,0,0.3); }
.score-badge.s3, .score-badge.s4 { background: rgba(0,255,159,0.15); color: var(–accent2); border: 1.5px solid rgba(0,255,159,0.3); }
.badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.badge-win { background: rgba(0,255,159,0.15); color: var(–accent2); border: 1px solid rgba(0,255,159,0.3); }
.badge-lose { background: rgba(255,107,107,0.15); color: var(–warn); border: 1px solid rgba(255,107,107,0.3); }
.badge-pending { background: rgba(122,139,160,0.15); color: var(–muted); border: 1px solid rgba(122,139,160,0.3); }
.badge-excluded { background: rgba(255,107,107,0.1); color: var(–warn); border: 1px solid rgba(255,107,107,0.3); }

.prices-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; text-align: center; font-size: 11px; margin-top: 8px; }
.price-item-label { color: var(–muted); margin-bottom: 2px; }
.price-item-val { font-weight: 700; font-family: ‘JetBrains Mono’, monospace; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.stat-box { background: var(–surface2); border: 1px solid var(–border); border-radius: 10px; padding: 12px; text-align: center; }
.stat-label { font-size: 10px; color: var(–muted); font-weight: 700; margin-bottom: 4px; }
.stat-val { font-size: 26px; font-weight: 900; font-family: ‘JetBrains Mono’, monospace; color: var(–accent); }
.stat-sub { font-size: 10px; color: var(–muted); margin-top: 2px; }

.score-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid var(–border); }
.score-row:last-child { border-bottom: none; }
.score-pill { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; margin-right: 10px; flex-shrink: 0; }
.bar-wrap { flex: 1; }
.bar-labels { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 3px; }
.bar-bg { height: 6px; background: var(–border); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; }
.bar-fill.high { background: linear-gradient(90deg, var(–accent2), var(–accent)); }
.bar-fill.mid { background: var(–gold); }
.bar-fill.low { background: var(–warn); }
.score-cnt { font-size: 11px; color: var(–muted); margin-left: 8px; white-space: nowrap; }

.progress-bar { height: 4px; background: var(–border); border-radius: 2px; overflow: hidden; margin: 6px 0; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(–accent2), var(–accent)); border-radius: 2px; }

.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(–surface); border-top: 1px solid var(–border); display: flex; z-index: 100; }
.nav-btn { flex: 1; padding: 10px 4px 6px; text-align: center; border: none; background: none; cursor: pointer; color: var(–muted); font-size: 10px; font-weight: 700; }
.nav-btn.active { color: var(–accent); }
.nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }

.empty { text-align: center; padding: 40px 20px; color: var(–muted); }
.empty .emoji { font-size: 48px; display: block; margin-bottom: 12px; }

.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(–accent2); color: #000; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.paste-card { border-color: rgba(0,212,255,0.4); background: linear-gradient(135deg,rgba(0,212,255,0.05),rgba(0,255,159,0.05)); }
.divider { text-align: center; font-size: 11px; color: var(–muted); margin: -2px 0 8px; }

/* ── AI bubble ── */
.ai-box {
background: linear-gradient(135deg, #0f1f35, #0a1628);
border: 1px solid #2a4060;
border-left: 3px solid #7c3aed;
border-radius: 12px; padding: 14px;
margin-top: 10px; display: none;
font-size: 13px; line-height: 1.9; white-space: pre-wrap;
}
.ai-box.visible { display: block; }
.ai-box-label { font-size: 10px; color: #a78bfa; letter-spacing: 0.2em; font-family: ‘JetBrains Mono’, monospace; margin-bottom: 8px; font-weight: 700; }

/* AI判定バッジ */
.ai-verdict-ok   { color: var(–accent2); font-weight: 900; font-size: 16px; }
.ai-verdict-ng   { color: var(–warn);    font-weight: 900; font-size: 16px; }
.ai-verdict-warn { color: var(–gold);    font-weight: 900; font-size: 16px; }

/* ドット思考中アニメ */
.thinking { display: flex; gap: 4px; align-items: center; padding: 6px 0; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #a78bfa; animation: pulse 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

/* 材料チェック専用 */
.material-badge-ok   { background: rgba(0,255,159,0.15); color: var(–accent2); border: 1px solid rgba(0,255,159,0.4); display: inline-block; padding: 3px 12px; border-radius: 20px; font-weight: 700; font-size: 13px; margin-bottom: 6px; }
.material-badge-warn { background: rgba(255,215,0,0.15); color: var(–gold); border: 1px solid rgba(255,215,0,0.4); display: inline-block; padding: 3px 12px; border-radius: 20px; font-weight: 700; font-size: 13px; margin-bottom: 6px; }
.material-badge-ng   { background: rgba(255,107,107,0.15); color: var(–warn); border: 1px solid rgba(255,107,107,0.4); display: inline-block; padding: 3px 12px; border-radius: 20px; font-weight: 700; font-size: 13px; margin-bottom: 6px; }

/* 連続ランキング検知バナー */
.consecutive-banner {
background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(217,119,6,0.1));
border: 1px solid rgba(245,158,11,0.4);
border-radius: 12px; padding: 12px 14px; margin-bottom: 10px;
}
.consecutive-code { font-family: ‘JetBrains Mono’, monospace; font-weight: 900; color: var(–gold); font-size: 15px; }
</style>

</head>
<body>

<div class="header">
  <div class="app-title">低位株<span>TRADE</span></div>
  <div class="date-badge" id="todayDate"></div>
</div>

<!-- ══════════ 入力ページ ══════════ -->

<div class="page active" id="page-input">
  <div class="card paste-card">
    <div class="card-title" style="color:var(--accent2)">🤖 貼り付け自動入力</div>
    <textarea id="pasteBox" placeholder="GPTのテキストをここに貼り付け&#10;複数銘柄は---で区切る"></textarea>
    <button class="btn-primary" style="margin-top:8px;" onclick="doPaste()">⚡ 自動入力する</button>
  </div>
  <div class="divider">── または手動で入力 ──</div>

  <div class="card">
    <div class="card-title">📋 銘柄情報</div>
    <div class="form-row">
      <div class="form-group"><label>銘柄コード</label><input type="number" id="f_code" inputmode="numeric" placeholder="1234"></div>
      <div class="form-group"><label>日付</label><input type="date" id="f_date"></div>
    </div>
    <div class="form-group"><label>銘柄名</label><input type="text" id="f_name" placeholder="○○工業"></div>
  </div>

  <div class="card">
    <div class="card-title">📊 前日 4値</div>
    <div class="form-row">
      <div class="form-group"><label>始値</label><input type="number" id="f_open" inputmode="decimal" placeholder="180" oninput="calcScore()"></div>
      <div class="form-group"><label>高値</label><input type="number" id="f_high" inputmode="decimal" placeholder="195" oninput="calcScore()"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>安値</label><input type="number" id="f_low" inputmode="decimal" placeholder="175" oninput="calcScore()"></div>
      <div class="form-group"><label>終値</label><input type="number" id="f_close" inputmode="decimal" placeholder="192" oninput="calcScore()"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📈 出来高</div>
    <div class="form-row">
      <div class="form-group"><label>売買代金(千円)</label><input type="number" id="f_vol" inputmode="decimal" placeholder="1343329" oninput="calcScore()"></div>
      <div class="form-group"><label>出来高倍率(倍)</label><input type="number" id="f_volRatio" inputmode="decimal" placeholder="3.5" step="0.1" oninput="calcScore()"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🌙 夜間(JNX/PTS)</div>
    <div class="form-row">
      <div class="form-group"><label>夜間始値</label><input type="number" id="f_nOpen" inputmode="decimal" placeholder="82" oninput="calcScore()"></div>
      <div class="form-group"><label>夜間高値</label><input type="number" id="f_nHigh" inputmode="decimal" placeholder="84.5" oninput="calcScore()"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>夜間安値</label><input type="number" id="f_nLow" inputmode="decimal" placeholder="79" oninput="calcScore()"></div>
      <div class="form-group"><label>夜間終値</label><input type="number" id="f_nClose" inputmode="decimal" placeholder="84.5" oninput="calcScore()"></div>
    </div>
    <div class="form-group"><label>夜間代金(千円)</label><input type="number" id="f_nVol" inputmode="decimal" placeholder="31217" oninput="calcScore()"></div>
  </div>

  <!-- スコア表示 -->

  <div class="score-display" id="scoreDisplay">
    <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:6px;">SIGNAL SCORE</div>
    <div class="score-num s0" id="scoreNum">—</div>
    <div class="score-verdict" id="scoreVerdict" style="color:var(--muted)">終値を入力してください</div>
  </div>

  <div class="flags" id="flagsArea"></div>

  <div class="price-boxes">
    <div class="price-box entry"><div class="price-box-label">エントリー</div><div class="price-box-value" id="p_entry">—</div><div class="price-box-sub" id="p_entrySub"></div></div>
    <div class="price-box profit"><div class="price-box-label">利確</div><div class="price-box-value" id="p_profit">—</div><div class="price-box-sub" id="p_profitSub"></div></div>
    <div class="price-box loss"><div class="price-box-label">損切</div><div class="price-box-value" id="p_loss">—</div><div class="price-box-sub" id="p_lossSub">-3.5%</div></div>
  </div>

  <!-- ① AI判断ボタン -->

<button class="btn-ai" id="aiJudgeBtn" onclick="runAIJudge()">🤖 AI判断</button>

  <div class="ai-box" id="aiJudgeBox">
    <div class="ai-box-label">◆ AI ENTRY JUDGE</div>
    <div id="aiJudgeContent"></div>
  </div>

<button class="btn-primary" onclick="saveRecord()">💾 記録する</button>
<button class="btn-secondary" onclick="clearForm()">クリア</button>

</div>

<!-- ══════════ 記録ページ ══════════ -->

<div class="page" id="page-list">
  <div id="listArea"></div>
</div>

<!-- ══════════ 結果ページ ══════════ -->

<div class="page" id="page-result">
  <div class="card paste-card">
    <div class="card-title" style="color:var(--accent2)">🤖 結果貼り付け</div>
    <textarea id="resultPasteBox" placeholder="GPTの結果テキストをここに貼り付け&#10;&#10;銘柄コード：1234&#10;寄り付き：190&#10;高値：200&#10;安値：185&#10;---"></textarea>
    <button class="btn-primary" style="margin-top:8px;" onclick="doResultPaste()">⚡ 結果を自動入力する</button>
  </div>
  <div class="divider">── または個別に入力 ──</div>
  <div id="resultArea"></div>
</div>

<!-- ══════════ 分析ページ ══════════ -->

<div class="page" id="page-stats">

  <!-- ⑥ 材料チェック（2日連続検知） -->

  <div id="consecutiveArea"></div>

  <div class="stat-grid" id="statsGrid"></div>

  <div class="card">
    <div class="card-title">📊 スコア別分析</div>
    <div id="scoreAnalysis"></div>
  </div>

  <!-- ② スコア分析AI -->

  <div class="card" style="margin-top:10px;">
    <div class="card-title" style="color:#a78bfa;">🤖 スコア分析AI</div>
    <button class="btn-ai" id="aiScoreBtn" onclick="runScoreAnalysisAI()">📊 AIが負け原因を分析する</button>
    <div class="ai-box" id="aiScoreBox">
      <div class="ai-box-label">◆ AI SCORE ANALYSIS</div>
      <div id="aiScoreContent"></div>
    </div>
  </div>

  <!-- ③④ エントリー・利確最適化AI -->

  <div class="card" style="margin-top:10px;">
    <div class="card-title" style="color:#a78bfa;">🤖 エントリー価格・利確最適化AI</div>
    <button class="btn-ai" id="aiOptBtn" onclick="runOptimizeAI()">💹 スコア別 最適指値を提案</button>
    <div class="ai-box" id="aiOptBox">
      <div class="ai-box-label">◆ AI OPTIMIZATION</div>
      <div id="aiOptContent"></div>
    </div>
  </div>

  <div class="card" style="margin-top:10px;">
    <div class="card-title">🔒 データ管理</div>
    <button class="btn-primary" onclick="exportCSV()">📊 CSVダウンロード</button>
    <button class="btn-secondary" onclick="backupData()" style="margin-top:8px;">📋 バックアップをコピー</button>
    <textarea id="restoreBox" placeholder="バックアップテキストをここに貼り付けて復元" style="margin-top:8px;min-height:60px;"></textarea>
    <button class="btn-warn" onclick="restoreData()">🔄 データ復元</button>
    <button class="btn-warn" onclick="dedupeData()" style="margin-top:8px;">🧹 重複削除</button>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('input',this)"><span class="nav-icon">✏️</span>入力</button>
  <button class="nav-btn" onclick="showPage('list',this)"><span class="nav-icon">📋</span>記録</button>
  <button class="nav-btn" onclick="showPage('result',this)"><span class="nav-icon">🎯</span>結果</button>
  <button class="nav-btn" onclick="showPage('stats',this)"><span class="nav-icon">📊</span>分析</button>
</div>
<div class="toast" id="toast"></div>

<script>
// ========== ストレージ ==========
const STORE_KEY = 'tgk_v3';
function loadRecords() {
  try { const d = localStorage.getItem(STORE_KEY); if (d) { const p = JSON.parse(d); if (Array.isArray(p)) return p; } } catch(e) {}
  return [];
}
function saveAll(records) { localStorage.setItem(STORE_KEY, JSON.stringify(records)); }

// ========== ヘルパー ==========
const safeDiv = (a, b) => (b === 0 || !isFinite(b)) ? 0 : a / b;
const clamp   = (n, mn, mx) => Math.min(Math.max(n, mn), mx);
function median(arr) {
  if (!arr.length) return null;
  const s = [...arr].sort((a, b) => a - b);
  const m = Math.floor(s.length / 2);
  return s.length % 2 ? s[m] : (s[m-1] + s[m]) / 2;
}
function percentileLine(arr, pct) {
  if (!arr.length) return null;
  const s = [...arr].sort((a, b) => a - b);
  const idx = Math.floor(s.length * pct);
  return s[Math.min(idx, s.length - 1)];
}

// ========== 自動最適化 ==========
const MIN_DATA = 30;
function isOptimized() {
  const records = loadRecords().filter(r => !r.isExcluded);
  return records.filter(r => r.actualOpen != null || r.actualHigh != null || r.actualLow != null).length >= MIN_DATA;
}
function calcOptimalProfitRates() {
  const records = loadRecords().filter(r => !r.isExcluded);
  const rates = {};
  for (let s = 0; s <= 6; s++) {
    const rises = records.filter(r => r.score === s && r.result === '勝' && r.actualHigh && r.entry).map(r => (r.actualHigh - r.entry) / r.entry);
    if (rises.length >= 5) { const med = median(rises); rates[s] = clamp(med * 0.9, 0.02, 0.15); }
  }
  return rates;
}
function calcOptimalEntryRates() {
  const records = loadRecords().filter(r => !r.isExcluded);
  const rates = {};
  for (let s = 0; s <= 6; s++) {
    const gaps = records.filter(r => r.score === s && r.actualOpen && r.close).map(r => (r.actualOpen - r.close) / r.close);
    if (gaps.length >= 5) { const line70 = percentileLine(gaps, 0.7); rates[s] = clamp(line70 + 0.005, 0.005, 0.08); }
  }
  return rates;
}
function getProfitRate(score) {
  if (!isOptimized()) return 0.04;
  const records = loadRecords().filter(r => !r.isExcluded);
  const scoreDone = records.filter(r => r.score === score && (r.actualOpen != null || r.actualHigh != null || r.actualLow != null)).length;
  if (scoreDone < 5) return 0.04;
  const rates = calcOptimalProfitRates();
  return rates[score] !== undefined ? rates[score] : 0.04;
}
function calcExpectedValues() {
  const records = loadRecords().filter(r => !r.isExcluded && r.filled === true);
  const ev = {};
  for (let s = 0; s <= 6; s++) {
    const done = records.filter(r => r.score === s && (r.result === '勝' || r.result === '負'));
    const wins = done.filter(r => r.result === '勝'); const losses = done.filter(r => r.result === '負');
    if (done.length < 3) { ev[s] = null; continue; }
    const winRate = wins.length / done.length; const lossRate = losses.length / done.length;
    const avgWin  = wins.length   ? wins.reduce((sum, r)   => sum + parseFloat(r.pnl || 0), 0) / wins.length   : 0;
    const avgLoss = losses.length ? Math.abs(losses.reduce((sum, r) => sum + parseFloat(r.pnl || 0), 0) / losses.length) : 0;
    ev[s] = winRate * avgWin - lossRate * avgLoss;
  }
  return ev;
}

// ========== 約定・勝敗判定 ==========
function judgeResult(r) {
  const aOpen = r.actualOpen; const aHigh = r.actualHigh; const aLow = r.actualLow;
  const hasAny = aOpen != null || aHigh != null || aLow != null;
  if (!hasAny) return { result: null, pnl: null, filled: false, fillType: '未入力', missType: '未入力' };
  const checkLow = aLow != null ? aLow : aOpen;
  const filled = checkLow != null && checkLow <= r.entry;
  if (!filled) return { result: null, pnl: null, filled: false, fillType: '未約定', missType: '刺さらず' };
  if (aHigh != null && aHigh >= r.profit) return { result: '勝', pnl: ((r.profit - r.entry) / r.entry * 100).toFixed(1), filled: true, fillType: '約定', missType: '' };
  if (aLow  != null && aLow  <= r.loss)   return { result: '負', pnl: ((r.loss  - r.entry) / r.entry * 100).toFixed(1), filled: true, fillType: '約定', missType: '' };
  let missType = '未達';
  if (aHigh != null && aHigh < r.profit) {
    const aLowCheck = aLow != null ? aLow : aOpen;
    missType = (aLowCheck != null && aLowCheck > r.loss) ? 'レンジ内' : '利確届かず';
  }
  return { result: null, pnl: null, filled: true, fillType: '約定', missType };
}

function calcMetrics(close, high, low, open, vr, nOpen, nHigh, nLow, nClose, nVol) {
  const nightRise      = close > 0 && nClose > 0 ? (nClose - close) / close : 0;
  const nightRangeRate = close > 0 && nHigh > 0 && nLow > 0 ? (nHigh - nLow) / close : 0;
  const nRange         = nHigh - nLow;
  const nightClosePos  = nRange > 0 ? safeDiv(nClose - nLow, nRange) : 0.5;
  const dRange         = high - low;
  const closePos       = dRange > 0 ? safeDiv(close - low, dRange) : 0.5;
  const upperWickRate  = close > 0 ? safeDiv(high - close, close) : 0;
  const warnFlags = [];
  if (nVol > 0 && nVol < 20000) warnFlags.push('夜間極薄'); else if (nVol > 0 && nVol < 50000) warnFlags.push('夜間薄い');
  if (vr > 0 && vr < 0.1) warnFlags.push('倍率極低'); else if (vr > 0 && vr < 0.3) warnFlags.push('倍率低い');
  return { nightRise, nightRangeRate, nightClosePos, closePos, upperWickRate, warnFlags };
}

function calcFullScore(close, high, low, open, vol, vr, nOpen, nHigh, nLow, nClose, nVol) {
  const m = calcMetrics(close, high, low, open, vr, nOpen, nHigh, nLow, nClose, nVol);
  const { nightRise, nightRangeRate, nightClosePos, closePos, upperWickRate, warnFlags } = m;
  const isExcluded = nightRise >= 0.15 || close <= 50;
  const excludeReason = nightRise >= 0.15 ? '夜間過熱' : close <= 50 ? '超低価格株' : '';
  let score = 0;
  if (low > 0 && (close - low) / low > 0.03) score++;
  if (open > 0 && close > open) score++;
  if (vol > 500000) score++;
  if (vr >= 5) score += 2; else if (vr >= 2) score++;
  if (nightRise > 0.01 && !isExcluded) score++;
  if (nHigh > 0 && nOpen > 0 && (nHigh-nOpen)/nOpen > 0.01 && !isExcluded) score++;
  if (high > 0 && nHigh > 0 && nHigh > high) score++;
  if (nightRangeRate >= 0.05) score++;
  if (nightClosePos >= 0.7) score++;
  if (closePos >= 0.7) score++;
  if (upperWickRate < 0.02 && high > 0) score++;
  if (nVol > 0 && nVol < 20000) score -= 2; else if (nVol > 0 && nVol < 50000) score--;
  if (vr > 0 && vr < 0.1) score -= 2; else if (vr > 0 && vr < 0.3) score--;
  if (nightRangeRate > 0 && nightRangeRate < 0.02) score--;
  if (nightClosePos < 0.3 && nHigh !== nLow) score--;
  if (closePos < 0.3 && high !== low) score--;
  if (upperWickRate >= 0.10) score -= 2; else if (upperWickRate >= 0.05) score--;
  score = clamp(score, 0, 5);
  const req1 = vol > 500000; const req2 = nightRise > 0.01 && !isExcluded;
  const req3 = nightClosePos >= 0.7; const req4 = upperWickRate < 0.02 && high > 0;
  const opt1 = high > 0 && nHigh > 0 && nHigh > high; const opt2 = nightRangeRate >= 0.05; const opt3 = vr >= 2;
  if (req1 && req2 && req3 && req4 && [opt1,opt2,opt3].filter(Boolean).length >= 2) score = 6;
  return { score, isExcluded, excludeReason, warnFlags, ...m };
}

function calcEntry(score, nClose, close) {
  const base = nClose > 0 ? nClose : close;
  const mulTable = { 6: 0.99, 5: 0.987, 4: 0.985, 3: 0.98, 2: 0.975 };
  const multiplier = mulTable[score] !== undefined ? mulTable[score] : 0.97;
  const minEntry = base * 0.97;
  let entry = Math.max(base * multiplier, minEntry);
  entry = Math.floor(entry);
  return { entry, multiplier };
}

function detectConsecutive() {
  const records=loadRecords().filter(r=>!r.isExcluded);
  // 銘柄別に日付をまとめ、2日以上あるものを抽出
  const byCode={};
  records.forEach(r=>{
    if (!byCode[r.code]) byCode[r.code]={name:r.name,dates:[]};
    if (!byCode[r.code].dates.includes(r.date)) byCode[r.code].dates.push(r.date);
  });
  const result=[];
  Object.entries(byCode).forEach(([code,d])=>{
    if (d.dates.length>=2) {
      const sorted=d.dates.sort();
      result.push({code,name:d.name,dates:sorted,count:d.dates.length});
    }
  });
  return result;
}

async function runMaterialCheck(code,name,nVol,nightRise) {
  const btn=document.getElementById('matBtn_'+code);
  if (btn) btn.disabled=true;
  const box=document.getElementById('matBox_'+code);
  const content=document.getElementById('matContent_'+code);
  if (box) box.classList.add('visible');
  if (content) content.innerHTML='<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

  const prompt=`あなたは日本株の短期トレード判断支援AIです。
以下の銘柄について、夜間PTSランキングに2日以上連続でランクインしています。

【銘柄情報】
銘柄コード：${code}
銘柄名：${name||'不明'}
夜間上昇率（直近）：約${(nightRise*100).toFixed(1)}%
夜間代金：${nVol}千円

以下を分析してください（web検索を活用して最新情報を調べること）：
1. 材料の有無（IR・適時開示・ニュース）
2. 材料の継続性（単発 or 継続テーマ）
3. 出来高の維持状況
4. チャート状態（押し目形成 or 崩れ）

【出力フォーマット】
判定：保有OK / 注意 / 見送り
・[根拠1]
・[根拠2]
・[根拠3]
注意事項：[あれば]`;

  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    const text=data.content?.map(c=>c.type==='text'?c.text:'').filter(Boolean).join('')||'情報取得できませんでした';
    if (content) content.textContent=text;
  } catch(e) {
    if (content) content.textContent='エラーが発生しました。';
  }
  if (btn) btn.disabled=false;
}

// ========== 記録保存 ==========
function saveRecord() {
  const code=document.getElementById('f_code').value.trim();
  const date=document.getElementById('f_date').value;
  const close=parseFloat(document.getElementById('f_close').value)||0;
  if (!code||!close) { showToast('❌ 銘柄コードと終値は必須です'); return; }
  const records=loadRecords();
  const dupIdx=records.findIndex(r=>String(r.code)===String(code)&&r.date===date);
  if (dupIdx>=0&&!confirm(code+'('+date+')は既に記録済みです。上書きしますか？')) return;
  const open=parseFloat(document.getElementById('f_open').value)||0;
  const high=parseFloat(document.getElementById('f_high').value)||0;
  const low=parseFloat(document.getElementById('f_low').value)||0;
  const vol=parseFloat(document.getElementById('f_vol').value)||0;
  const vr=parseFloat(document.getElementById('f_volRatio').value)||0;
  const nOpen=parseFloat(document.getElementById('f_nOpen').value)||0;
  const nHigh=parseFloat(document.getElementById('f_nHigh').value)||0;
  const nLow=parseFloat(document.getElementById('f_nLow').value)||0;
  const nClose=parseFloat(document.getElementById('f_nClose').value)||0;
  const nVol=parseFloat(document.getElementById('f_nVol').value)||0;
  const name=document.getElementById('f_name').value.trim();
  const R=calcFullScore(close,high,low,open,vol,vr,nOpen,nHigh,nLow,nClose,nVol);
  const {score,isExcluded,excludeReason,warnFlags,nightRise,nightRangeRate,nightClosePos,closePos,upperWickRate}=R;
  const {entry,multiplier:entryMultiplier}=calcEntry(score,nClose,close);
  const profitRate=getProfitRate(score);
  let profit=Math.round(entry*(1+profitRate)); let loss=Math.round(entry*0.965);
  if (profit-entry<1) profit=entry+1; if (entry-loss<1) loss=entry-1;
  const record={id:Date.now(),code,date,name,open,high,low,close,vol,vr,nOpen,nHigh,nLow,nClose,nVol,score,entry,profit,loss,profitRate,entryMultiplier,isExcluded,excludeReason,warnFlags,nightRise,nightRangeRate,nightClosePos,closePos,upperWickRate,actualOpen:null,actualHigh:null,actualLow:null,result:null,pnl:null,missType:'未入力'};
  if (dupIdx>=0) {
    record.actualOpen=records[dupIdx].actualOpen; record.actualHigh=records[dupIdx].actualHigh;
    record.actualLow=records[dupIdx].actualLow; record.result=records[dupIdx].result;
    record.pnl=records[dupIdx].pnl; record.missType=records[dupIdx].missType??'未入力';
    records[dupIdx]=record;
  } else records.unshift(record);
  saveAll(records); clearForm(); showToast('✅ 記録しました！'); renderAll();
}

function clearForm() {
  ['f_code','f_name','f_open','f_high','f_low','f_close','f_vol','f_volRatio','f_nOpen','f_nHigh','f_nLow','f_nClose','f_nVol'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('f_date').value=today.toISOString().split('T')[0]; calcScore();
}

function doPaste() {
  const text=document.getElementById('pasteBox').value.trim();
  if (!text) { showToast('❌ テキストを入力してください'); return; }
  const blocks=text.split(/\n---+\n?|\n(?=銘柄コード[：:])/);
  let count=0;
  blocks.forEach(block=>{
    block=block.trim(); if (!block) return;
    const getVal=(keys)=>{ for (const key of keys) { const m=block.match(new RegExp(key+'[：:]\\s*([\\d\\.]+)','i')); if (m) return m[1]; } return ''; };
    const getName=()=>{ const m=block.match(/銘柄名[：:]\s*(.+)/); return m?m[1].trim():''; };
    const code=getVal(['銘柄コード']); if (!code) return;
    document.getElementById('f_code').value=code;
    document.getElementById('f_name').value=getName();
    document.getElementById('f_open').value=getVal(['始値']);
    document.getElementById('f_high').value=getVal(['高値']);
    document.getElementById('f_low').value=getVal(['安値']);
    document.getElementById('f_close').value=getVal(['終値']);
    document.getElementById('f_vol').value=getVal(['売買代金']);
    document.getElementById('f_volRatio').value=getVal(['出来高倍率']);
    document.getElementById('f_nOpen').value=getVal(['夜間始値']);
    document.getElementById('f_nHigh').value=getVal(['夜間高値']);
    document.getElementById('f_nLow').value=getVal(['夜間安値']);
    document.getElementById('f_nClose').value=getVal(['夜間終値']);
    document.getElementById('f_nVol').value=getVal(['夜間代金']);
    calcScore();
    if (blocks.length>1) { const c=document.getElementById('f_close').value; const cd=document.getElementById('f_code').value; if (cd&&c) { saveRecordSilent(); count++; } }
  });
  document.getElementById('pasteBox').value='';
  if (blocks.length>1) { showToast('✅ '+count+'件を保存しました！'); renderAll(); }
  else showToast('✅ 入力しました！内容確認して💾ボタンで保存');
}

function doResultPaste() {
  const text=document.getElementById('resultPasteBox').value.trim();
  if (!text) { showToast('❌ テキストを入力してください'); return; }
  const toNum=(v)=>{ if (v==null) return null; const s=String(v).replace(/[　 ，,]/g,'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[．]/g,'.').replace(/[－−]/g,'-'); const n=parseFloat(s); return isNaN(n)?null:n; };
  const records=loadRecords(); let updated=0;
  const blocks=text.split(/\n?---+\n?/).map(b=>b.trim()).filter(b=>b.length>0);
  blocks.forEach(block=>{
    const getVal=(keys)=>{ for (const key of keys) { const m=block.match(new RegExp(key+'[：:]\\s*([\\d\\.,．０-９]+)','i')); if (m) return toNum(m[1]); } return null; };
    const codeMatch=block.match(/銘柄コード[：:]\s*(\d+)/); if (!codeMatch) return;
    const codeStr=codeMatch[1].trim();
    const dateMatch=block.match(/日付[：:]\s*([\d\-\/]+)/);
    const normalizeDate=(d)=>d?d.replace(/\//g,'-'):null;
    const dateStr=normalizeDate(dateMatch?dateMatch[1].trim():null);
    const aOpen=getVal(['寄り付き','実際の寄り付き']); const aHigh=getVal(['高値','当日高値']); const aLow=getVal(['安値','当日安値']);
    if (aOpen===null&&aHigh===null&&aLow===null) return;
    let candidates=records.map((r,idx)=>({r,idx})).filter(({r})=>String(r.code).trim()===codeStr);
    if (dateStr) candidates=candidates.filter(({r})=>r.date.replace(/\//g,'-')===dateStr); else candidates=candidates.slice(0,1);
    candidates.forEach(({idx})=>{
      if (aOpen!==null) records[idx].actualOpen=aOpen; if (aHigh!==null) records[idx].actualHigh=aHigh; if (aLow!==null) records[idx].actualLow=aLow;
      const j=judgeResult(records[idx]); records[idx].result=j.result; records[idx].pnl=j.pnl; records[idx].filled=j.filled; records[idx].fillType=j.fillType; records[idx].missType=j.missType;
      updated++;
    });
  });
  if (updated>0) {
    saveAll(records); document.getElementById('resultPasteBox').value='';
    const done=records.filter(r=>r.result==='勝'||r.result==='負').length;
    const saved=records.filter(r=>!r.result&&(r.actualOpen!=null||r.actualHigh!=null||r.actualLow!=null)).length;
    showToast('✅ '+updated+'件更新 / 決着:'+done+'件 未達:'+saved+'件'); renderAll();
  } else showToast('❌ 一致する記録が見つかりません');
}

function saveResult(id) {
  const aOpenEl=document.getElementById('aOpen_'+id); const aHighEl=document.getElementById('aHigh_'+id); const aLowEl=document.getElementById('aLow_'+id);
  const toNum=(el)=>{ if (!el) return null; const v=el.value.trim().replace(/[　 ，,]/g,'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[．]/g,'.').replace(/[－−]/g,'-'); const n=parseFloat(v); return isNaN(n)?null:n; };
  const aOpen=toNum(aOpenEl); const aHigh=toNum(aHighEl); const aLow=toNum(aLowEl);
  const records=loadRecords(); const idx=records.findIndex(r=>r.id===id);
  if (idx<0) { showToast('❌ 記録が見つかりません'); return; }
  records[idx].actualOpen=aOpen; records[idx].actualHigh=aHigh; records[idx].actualLow=aLow;
  const j=judgeResult(records[idx]); records[idx].result=j.result; records[idx].pnl=j.pnl; records[idx].filled=j.filled; records[idx].fillType=j.fillType; records[idx].missType=j.missType;
  saveAll(records);
  const verify=loadRecords().filter(r=>!r.isExcluded);
  const cntFilled=verify.filter(r=>r.filled===true).length;
  const cntUnfilled=verify.filter(r=>r.filled===false&&r.fillType==='未約定').length;
  const cntDone=verify.filter(r=>r.result==='勝'||r.result==='負').length;
  const label=j.filled?(j.result||j.missType||'未達'):'未約定';
  showToast('✅ '+label+' / 約定:'+cntFilled+' 未約定:'+cntUnfilled+' 決着:'+cntDone);
  renderAll();
}

function deleteRec(id) {
  if (!confirm('削除しますか？')) return;
  saveAll(loadRecords().filter(r=>r.id!==id)); showToast('🗑 削除しました'); renderAll();
}

function resultBadge(r) {
  if (r.isExcluded) return '<span class="badge badge-excluded">⚠️ 除外</span>';
  if (r.result==='勝') return '<span class="badge badge-win">🟢 勝</span>';
  if (r.result==='負') return '<span class="badge badge-lose">🔴 負</span>';
  const mt=r.missType??'未入力'; const ft=r.fillType??'';
  if (ft==='未約定'||mt==='刺さらず') return '<span class="badge badge-pending">⚪ 未約定</span>';
  if (mt==='利確届かず') return '<span class="badge" style="background:rgba(255,215,0,0.15);color:var(--gold);border:1px solid rgba(255,215,0,0.3);">🟡 利確届かず</span>';

}

function renderStats() {
  const records=loadRecords();
  const all=records.filter(r=>!r.isExcluded);
  const filled=all.filter(r=>r.filled===true||(r.fillType==='約定'));
  const unfilled=all.filter(r=>r.fillType==='未約定'||r.missType==='刺さらず');
  const done=all.filter(r=>r.result==='勝'||r.result==='負');
  const wins=done.filter(r=>r.result==='勝'); const losses=done.filter(r=>r.result==='負');
  const pending=filled.filter(r=>!r.result);
  const untouched=all.filter(r=>!r.fillType||r.fillType==='未入力'||(!r.actualOpen&&!r.actualHigh&&!r.actualLow));
  const excl=records.filter(r=>r.isExcluded);
  const wr=done.length?Math.round(wins.length/done.length*100):null;
  const wrColor=wr===null?'var(--accent)':wr>=60?'var(--accent2)':wr<40?'var(--warn)':'var(--gold)';

  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-box">
      <div class="stat-label">総記録数</div>
      <div class="stat-val">${records.length}</div>
      <div class="stat-sub">約定${filled.length} 未約定${unfilled.length} 未入力${untouched.length} 除外${excl.length}</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">勝率（約定確定）</div>
      <div class="stat-val" style="color:${wrColor}">${wr!==null?wr+'%':'—'}</div>
      <div class="stat-sub">${wins.length}勝 ${losses.length}負 ${pending.length}未達</div>
    </div>`;

  const progressCount=all.filter(r=>r.actualOpen!=null||r.actualHigh!=null||r.actualLow!=null).length;
  const pct=Math.min(progressCount/30*100,100); const remain=Math.max(30-progressCount,0);
  let statsHtml='';
  if (progressCount<MIN_DATA) {
    statsHtml+=`<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">🔒 自動最適化まで ${remain}件（入力済み${progressCount}件）</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  } else {
    const optRates=calcOptimalProfitRates();
    const rateStr=[6,5,4,3,2,1,0].filter(s=>optRates[s]!==undefined).map(s=>s+'点:+'+Math.round(optRates[s]*100)+'%').join(' / ');
    statsHtml+=`<div style="font-size:11px;color:var(--accent2);margin-bottom:8px;font-weight:700;">🤖 自動最適化 稼働中（中央値ベース）</div><div style="font-size:10px;color:var(--muted);margin-bottom:8px;">${rateStr||'集計中...'}</div>`;
  }

  const missNone=all.filter(r=>!r.result&&(r.missType??'未入力')==='刺さらず').length;
  const missProfit=all.filter(r=>!r.result&&(r.missType??'')==='利確届かず').length;
  const missRange=all.filter(r=>!r.result&&(r.missType??'')==='レンジ内').length;
  if (missNone+missProfit+missRange>0) {
    statsHtml+=`<div style="font-size:11px;color:var(--muted);margin:8px 0 4px;font-weight:700;">📊 未達分析</div><div style="font-size:11px;color:var(--muted);line-height:1.8;">🟡 刺さらず：${missNone}件　利確届かず：${missProfit}件　レンジ内：${missRange}件　⚪未入力：${untouched.length}件</div>`;
  }

  const evMap=calcExpectedValues();
  for (let s=6;s>=0;s--) {
    const grp=all.filter(r=>r.score===s);
    const dGrp=grp.filter(r=>r.result==='勝'||r.result==='負');
    const gW=dGrp.filter(r=>r.result==='勝'); const gL=dGrp.filter(r=>r.result==='負');
    const gP=grp.filter(r=>!r.result);
    if (!grp.length) continue;
    const wpct=dGrp.length?Math.round(gW.length/dGrp.length*100):0;
    const bc=s>=4?'high':s>=2?'mid':'low';
    const pillColor=s>=4?'background:rgba(0,255,159,0.15);color:var(--accent2)':s>=2?'background:rgba(255,215,0,0.15);color:var(--gold)':'background:rgba(255,107,107,0.15);color:var(--warn)';
    const ev=evMap[s];
    const evStr=ev!==null&&ev!==undefined?(ev>=0?'<span style="color:var(--accent2)">EV+'+ev.toFixed(1)+'%</span>':'<span style="color:var(--warn)">EV'+ev.toFixed(1)+'%</span>'):'';
    const guardStr=isOptimized()&&grp.length<5?'<span style="color:var(--warn);font-size:9px;">⚠️件数不足</span>':'';
    statsHtml+=`<div class="score-row"><div class="score-pill" style="${pillColor}">${s}</div><div class="bar-wrap"><div class="bar-labels"><span style="font-weight:700">${dGrp.length?wpct+'%':'未集計'}</span><span style="color:var(--muted);font-size:10px;">${gW.length}勝${gL.length}負${gP.length}未 ${evStr}${guardStr}</span></div><div class="bar-bg"><div class="bar-fill ${bc}" style="width:${wpct}%"></div></div></div><div class="score-cnt">${grp.length}件</div></div>`;
  }
  document.getElementById('scoreAnalysis').innerHTML=statsHtml||'<div style="color:var(--muted);font-size:12px;padding:12px 0">記録がありません</div>';

  // 連続ランキング検知
  renderConsecutive();
}

// ========== データ管理 ==========
function backupData() {
  const records=loadRecords(); if (!records.length) { showToast('❌ データがありません'); return; }
  const txt='TGKV3:'+JSON.stringify(records);
  navigator.clipboard.writeText(txt).then(()=>showToast('✅ '+records.length+'件をコピーしました')).catch(()=>{ document.getElementById('restoreBox').value=txt; showToast('✅ 下のテキストをコピーして保存してください'); });
}
function restoreData() {
  const txt=document.getElementById('restoreBox').value.trim(); if (!txt) { showToast('❌ テキストを貼り付けてください'); return; }
  try {
    const json=txt.startsWith('TGKV3:')?txt.slice(6):txt; const data=JSON.parse(json); if (!Array.isArray(data)) throw new Error();
    saveAll(data); document.getElementById('restoreBox').value=''; showToast('✅ '+data.length+'件を復元しました'); renderAll();
  } catch(e) { showToast('❌ 復元失敗。正しいバックアップか確認してください'); }
}
function dedupeData() {
  const records=loadRecords(); const seen=new Set();
  const clean=records.filter(r=>{ const key=r.code+'_'+r.date; if (seen.has(key)) return false; seen.add(key); return true; });
  const removed=records.length-clean.length;
  if (!removed) { showToast('✅ 重複データなし'); return; }
  if (confirm(removed+'件の重複を削除しますか？')) { saveAll(clean); showToast('🧹 '+removed+'件削除しました'); renderAll(); }
}
function exportCSV() {
  const records=loadRecords(); if (!records.length) { showToast('❌ データがありません'); return; }
  const h=['日付','コード','銘柄名','始値','高値','安値','終値','売買代金','倍率','夜間始','夜間高','夜間安','夜間終','夜間代金','スコア','エントリー','利確','損切','寄付','当日高','当日安','結果','損益率'];
  const rows=records.map(r=>[r.date,r.code,r.name??'',r.open,r.high,r.low,r.close,r.vol,r.vr,r.nOpen,r.nHigh,r.nLow,r.nClose,r.nVol,r.score,r.entry,r.profit,r.loss,r.actualOpen??'',r.actualHigh??'',r.actualLow??'',r.result??'',r.pnl??'']);
  const csv='\uFEFF'+[h,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='低位株_'+today.toISOString().split('T')[0]+'.csv'; a.click(); showToast('📥 ダウンロード中...');
}

// ========== ページ切り替え ==========
function showPage(name,btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='list') renderList();
  if (name==='result') renderResult();
  if (name==='stats') renderStats();
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}

// ========== 起動 ==========
const startRecords=loadRecords();
if (startRecords.length>0) showToast('✅ '+startRecords.length+'件読み込みました');
renderAll();
</script>
