<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>低位株TRADE</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a; --surface: #111827; --surface2: #1a2234;
  --border: #2a3a52; --accent: #00d4ff; --accent2: #00ff9f;
  --warn: #ff6b6b; --gold: #ffd700; --text: #e8f0fe; --muted: #7a8ba0;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; padding-bottom: 80px; }

.header { background: #0f1c35; border-bottom: 1px solid var(–border); padding: 14px 16px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
.app-title { font-size: 18px; font-weight: 900; } .app-title span { color: var(–accent); }
.date-badge { background: var(–surface2); border: 1px solid var(–border); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: var(–muted); font-family: ‘JetBrains Mono’, monospace; }

.page { display: none; padding: 12px; }
.page.active { display: block; }

.card { background: var(–surface); border: 1px solid var(–border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.card-title { font-size: 11px; font-weight: 700; color: var(–accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.form-group { margin-bottom: 10px; }
label { display: block; font-size: 11px; color: var(–muted); font-weight: 700; margin-bottom: 4px; }
input, select, textarea { width: 100%; background: var(–surface2); border: 1.5px solid var(–border); border-radius: 10px; padding: 11px 12px; color: var(–text); font-size: 16px; font-family: ‘JetBrains Mono’, monospace; -webkit-appearance: none; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(–accent); }
textarea { font-family: ‘Noto Sans JP’, sans-serif; font-size: 13px; min-height: 80px; resize: none; line-height: 1.6; }

.score-display { background: var(–surface2); border-radius: 14px; padding: 16px; text-align: center; border: 2px solid var(–border); margin-bottom: 12px; }
.score-num { font-size: 60px; font-weight: 900; font-family: ‘JetBrains Mono’, monospace; line-height: 1; }
.score-num.s0, .score-num.s1 { color: var(–warn); }
.score-num.s2 { color: var(–gold); }
.score-num.s3, .score-num.s4 { color: var(–accent2); }
.score-verdict { font-size: 13px; font-weight: 700; margin-top: 6px; }

.price-boxes { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.price-box { border-radius: 10px; padding: 10px 6px; text-align: center; border: 1.5px solid; }
.price-box.entry { background: rgba(0,212,255,0.08); border-color: rgba(0,212,255,0.3); }
.price-box.profit { background: rgba(0,255,159,0.08); border-color: rgba(0,255,159,0.3); }
.price-box.loss { background: rgba(255,107,107,0.08); border-color: rgba(255,107,107,0.3); }
.price-box-label { font-size: 9px; color: var(–muted); font-weight: 700; margin-bottom: 3px; }
.price-box-value { font-size: 18px; font-weight: 900; font-family: ‘JetBrains Mono’, monospace; }
.price-box.entry .price-box-value { color: var(–accent); }
.price-box.profit .price-box-value { color: var(–accent2); }
.price-box.loss .price-box-value { color: var(–warn); }
.price-box-sub { font-size: 9px; color: var(–muted); margin-top: 2px; }

.flags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.flag { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; border: 1.5px solid; }
.flag.on { background: rgba(0,255,159,0.1); border-color: rgba(0,255,159,0.4); color: var(–accent2); }
.flag.off { background: rgba(122,139,160,0.05); border-color: rgba(122,139,160,0.15); color: var(–muted); }
.flag.excluded { background: rgba(255,107,107,0.1); border-color: rgba(255,107,107,0.4); color: var(–warn); }

.btn-primary { width: 100%; background: linear-gradient(135deg, var(–accent), #0099cc); color: #000; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 900; cursor: pointer; margin-bottom: 8px; }
.btn-secondary { width: 100%; background: transparent; color: var(–accent); border: 1.5px solid var(–accent); border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-warn { width: 100%; background: transparent; color: var(–warn); border: 1.5px solid var(–warn); border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; }
.btn-ai { width: 100%; background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; border: none; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 900; cursor: pointer; margin-bottom: 8px; }
.btn-ai:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-material { width: 100%; background: linear-gradient(135deg, #d97706, #b45309); color: #fff; border: none; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 900; cursor: pointer; margin-bottom: 8px; }
.btn-material:disabled { opacity: 0.5; cursor: not-allowed; }
.ai-box { background: linear-gradient(135deg, #0f1f35, #0a1628); border: 1px solid #2a4060; border-left: 3px solid #7c3aed; border-radius: 12px; padding: 14px; margin-top: 10px; display: none; font-size: 13px; line-height: 1.9; white-space: pre-wrap; }
.ai-box.visible { display: block; }
.ai-box-label { font-size: 10px; color: #a78bfa; letter-spacing: 0.2em; font-family: ‘JetBrains Mono’, monospace; margin-bottom: 8px; font-weight: 700; }
.thinking { display: flex; gap: 4px; align-items: center; padding: 6px 0; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #a78bfa; animation: pulse 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }
.consecutive-banner { background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(217,119,6,0.1)); border: 1px solid rgba(245,158,11,0.4); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
.consecutive-code { font-family: ‘JetBrains Mono’, monospace; font-weight: 900; color: var(–gold); font-size: 15px; }

.record-item { background: var(–surface); border: 1px solid var(–border); border-radius: 12px; padding: 12px; margin-bottom: 8px; }
.record-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.record-code { font-size: 18px; font-weight: 900; font-family: ‘JetBrains Mono’, monospace; }
.record-name { font-size: 11px; color: var(–muted); }
.score-badge { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; font-family: ‘JetBrains Mono’, monospace; flex-shrink: 0; }
.score-badge.s0, .score-badge.s1 { background: rgba(255,107,107,0.15); color: var(–warn); border: 1.5px solid rgba(255,107,107,0.3); }
.score-badge.s2 { background: rgba(255,215,0,0.15); color: var(–gold); border: 1.5px solid rgba(255,215,0,0.3); }
.score-badge.s3, .score-badge.s4 { background: rgba(0,255,159,0.15); color: var(–accent2); border: 1.5px solid rgba(0,255,159,0.3); }
.badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.badge-win { background: rgba(0,255,159,0.15); color: var(–accent2); border: 1px solid rgba(0,255,159,0.3); }
.badge-lose { background: rgba(255,107,107,0.15); color: var(–warn); border: 1px solid rgba(255,107,107,0.3); }
.badge-pending { background: rgba(122,139,160,0.15); color: var(–muted); border: 1px solid rgba(122,139,160,0.3); }
.badge-excluded { background: rgba(255,107,107,0.1); color: var(–warn); border: 1px solid rgba(255,107,107,0.3); }

.prices-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; text-align: center; font-size: 11px; margin-top: 8px; }
.price-item-label { color: var(–muted); margin-bottom: 2px; }
.price-item-val { font-weight: 700; font-family: ‘JetBrains Mono’, monospace; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.stat-box { background: var(–surface2); border: 1px solid var(–border); border-radius: 10px; padding: 12px; text-align: center; }
.stat-label { font-size: 10px; color: var(–muted); font-weight: 700; margin-bottom: 4px; }
.stat-val { font-size: 26px; font-weight: 900; font-family: ‘JetBrains Mono’, monospace; color: var(–accent); }
.stat-sub { font-size: 10px; color: var(–muted); margin-top: 2px; }

.score-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid var(–border); }
.score-row:last-child { border-bottom: none; }
.score-pill { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; margin-right: 10px; flex-shrink: 0; }
.bar-wrap { flex: 1; }
.bar-labels { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 3px; }
.bar-bg { height: 6px; background: var(–border); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; }
.bar-fill.high { background: linear-gradient(90deg, var(–accent2), var(–accent)); }
.bar-fill.mid { background: var(–gold); }
.bar-fill.low { background: var(–warn); }
.score-cnt { font-size: 11px; color: var(–muted); margin-left: 8px; white-space: nowrap; }

.progress-bar { height: 4px; background: var(–border); border-radius: 2px; overflow: hidden; margin: 6px 0; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(–accent2), var(–accent)); border-radius: 2px; }

.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(–surface); border-top: 1px solid var(–border); display: flex; z-index: 100; }
.nav-btn { flex: 1; padding: 10px 4px 6px; text-align: center; border: none; background: none; cursor: pointer; color: var(–muted); font-size: 10px; font-weight: 700; }
.nav-btn.active { color: var(–accent); }
.nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }

.empty { text-align: center; padding: 40px 20px; color: var(–muted); }
.empty .emoji { font-size: 48px; display: block; margin-bottom: 12px; }

.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(–accent2); color: #000; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.paste-card { border-color: rgba(0,212,255,0.4); background: linear-gradient(135deg,rgba(0,212,255,0.05),rgba(0,255,159,0.05)); }
.divider { text-align: center; font-size: 11px; color: var(–muted); margin: -2px 0 8px; }
</style>

</head>
<body>

<div class="header">
  <div class="app-title">低位株<span>TRADE</span></div>
  <div class="date-badge" id="todayDate"></div>
</div>

<!-- 入力ページ -->

<div class="page active" id="page-input">
  <div class="card paste-card">
    <div class="card-title" style="color:var(--accent2)">🤖 貼り付け自動入力</div>

  <div class="card">

  <div class="card">

    </div>
    <div class="form-row">
      <div class="form-group"><label>安値</label><input type="number" id="f_low" inputmode="decimal" placeholder="175" oninput="calcScore()"></div>

      <div class="form-group"><label>出来高倍率(倍)</label><input type="number" id="f_volRatio" inputmode="decimal" placeholder="3.5" step="0.1" oninput="calcScore()"></div>
    </div>

  <div class="card">
    <div class="card-title">🌙 夜間(JNX/PTS)</div>
    <div class="form-row">
      <div class="form-group"><label>夜間始値</label><input type="number" id="f_nOpen" inputmode="decimal" placeholder="82" oninput="calcScore()"></div>
      <div class="form-group"><label>夜間高値</label><input type="number" id="f_nHigh" inputmode="decimal" placeholder="84.5" oninput="calcScore()"></div>

      <div class="form-group"><label>夜間安値</label><input type="number" id="f_nLow" inputmode="decimal" placeholder="79" oninput="calcScore()"></div>
      <div class="form-group"><label>夜間終値</label><input type="number" id="f_nClose" inputmode="decimal" placeholder="84.5" oninput="calcScore()"></div>
    </div>

<button class="btn-ai" id="aiJudgeBtn" onclick="runAIJudge()">🤖 AI判断</button>

<script>
// ========== ストレージ ==========
const STORE_KEY = 'tgk_v3';

function loadRecords() {
  try {
    const d = localStorage.getItem(STORE_KEY);
    if (d) { const p = JSON.parse(d); if (Array.isArray(p)) return p; }
  } catch(e) {}
  return [];
}

function saveAll(records) {
  localStorage.setItem(STORE_KEY, JSON.stringify(records));
}

// ========== ヘルパー関数 ==========
const safeDiv = (a, b) => (b === 0 || !isFinite(b)) ? 0 : a / b;
const clamp   = (n, mn, mx) => Math.min(Math.max(n, mn), mx);

// 中央値計算
function median(arr) {
  if (!arr.length) return null;
  const s = [...arr].sort((a, b) => a - b);
  const m = Math.floor(s.length / 2);
  return s.length % 2 ? s[m] : (s[m-1] + s[m]) / 2;
}

// 到達率ライン：arr のうち pct% が届いてるラインを返す
function percentileLine(arr, pct) {
  if (!arr.length) return null;
  const s = [...arr].sort((a, b) => a - b);
  const idx = Math.floor(s.length * pct);
  return s[Math.min(idx, s.length - 1)];
}

// ========== 自動最適化 ==========
const MIN_DATA = 30;

function isOptimized() {
  const records = loadRecords().filter(r => !r.isExcluded);
  return records.filter(r =>
    r.actualOpen != null || r.actualHigh != null || r.actualLow != null
  ).length >= MIN_DATA;
}

// 利確率：スコア別・勝ちトレードのみ・上位30%ライン
function calcOptimalProfitRates() {
  const records = loadRecords().filter(r => !r.isExcluded && r.score > 0); // 0点除外
  const rates = {};
  for (let s = 1; s <= 6; s++) {
    // 勝ちトレードのみで計算
    const rises = records
      .filter(r => r.score === s && r.result === '勝' && r.actualHigh && r.entry)
      .map(r => (r.actualHigh - r.entry) / r.entry);
    if (rises.length >= 3) { // 3件以上で計算
      // 上位30%ラインではなく中央値の80%（控えめに）
      const med = median(rises);
      rates[s] = clamp(med * 0.8, 0.015, 0.12);
    }
  }
  return rates;
}

// エントリー率：スコア別・約定したトレードの寄り付きから計算
function calcOptimalEntryRates() {
  const records = loadRecords().filter(r => !r.isExcluded && r.score > 0);
  const rates = {};
  for (let s = 1; s <= 6; s++) {
    // 約定済みトレードの寄り付き÷PTS終値
    const gaps = records
      .filter(r => r.score === s && r.filled === true && r.actualOpen && r.nClose)
      .map(r => (r.actualOpen - r.nClose) / r.nClose);
    if (gaps.length >= 3) {
      // 50%ラインを使う（半分が届いてる位置→より浅め）
      const line50 = percentileLine(gaps, 0.5);
      rates[s] = clamp(line50 + 0.005, 0.005, 0.06);
    }
  }
  return rates;
}

function getProfitRate(score) {
  if (score === 0) return 0.03; // 0点は固定
  if (!isOptimized()) return 0.03;
  const records = loadRecords().filter(r => !r.isExcluded);
  const scoreDone = records.filter(r =>
    r.score === score &&
    (r.actualOpen != null || r.actualHigh != null || r.actualLow != null)
  ).length;
  if (scoreDone < 3) return 0.03; // 3件未満は固定値
  const rates = calcOptimalProfitRates();
  return rates[score] !== undefined ? rates[score] : 0.03;
}

// ① 期待値計算（スコア別・内部保持用）
// ルール（固定）：
// ・利確到達 = pnl（プラス）
// ・損切り到達 = pnl（マイナス）
// ・刺さらず = 0（機会損失のみ）
// ・利確届かず / レンジ内 = 0（将来は当日終値基準に拡張予定）
// EV = 勝ち率×平均利幅 − 負け率×平均損幅
function calcExpectedValues() {
  // 約定済みで勝負がついたもののみEV計算
  const records = loadRecords().filter(r => !r.isExcluded && r.filled === true);
  const ev = {};
  for (let s = 0; s <= 6; s++) {
    const done   = records.filter(r => r.score === s && (r.result === '勝' || r.result === '負'));
    const wins   = done.filter(r => r.result === '勝');
    const losses = done.filter(r => r.result === '負');
    if (done.length < 3) { ev[s] = null; continue; }

    const winRate  = wins.length / done.length;
    const lossRate = losses.length / done.length;

    // 平均利幅（勝ちトレードのpnl平均）
    const avgWin = wins.length
      ? wins.reduce((sum, r) => sum + parseFloat(r.pnl || 0), 0) / wins.length
      : 0;
    // 平均損幅（負けトレードのpnl絶対値平均）
    const avgLoss = losses.length
      ? Math.abs(losses.reduce((sum, r) => sum + parseFloat(r.pnl || 0), 0) / losses.length)
      : 0;

    // 未達（刺さらず/利確届かず/レンジ内）は0扱い
    ev[s] = winRate * avgWin - lossRate * avgLoss;
  }
  return ev;
}

// ② 将来拡張の内部設計（将来用コメント）
// missType の将来拡張設計：
// '刺さらず'      → 寄りで未達（寄り付き > entry）
// '刺さらず_10時' → 10時時点でも未達（将来実装）
// '刺さらず_終日' → 終日未達（将来実装）

// ========== 約定判定・勝敗判定（共通） ==========
// 約定条件：当日安値 <= エントリー指値
function judgeResult(r) {
  const aOpen = r.actualOpen;
  const aHigh = r.actualHigh;
  const aLow  = r.actualLow;
  const hasAny = aOpen != null || aHigh != null || aLow != null;

  if (!hasAny) {
    return { result: null, pnl: null, filled: false, fillType: '未入力', missType: '未入力' };
  }

  // 約定判定：安値がエントリー以下まで落ちたら約定
  const checkLow = aLow != null ? aLow : aOpen;
  const filled = checkLow != null && checkLow <= r.entry;

  if (!filled) {
    return { result: null, pnl: null, filled: false, fillType: '未約定', missType: '刺さらず' };
  }

  // 約定済みの場合のみ勝敗判定
  if (aHigh != null && aHigh >= r.profit) {
    return {
      result: '勝',
      pnl: ((r.profit - r.entry) / r.entry * 100).toFixed(1),
      filled: true, fillType: '約定', missType: ''
    };
  }
  if (aLow != null && aLow <= r.loss) {
    return {
      result: '負',
      pnl: ((r.loss - r.entry) / r.entry * 100).toFixed(1),
      filled: true, fillType: '約定', missType: ''
    };
  }

  // 約定したが利確・損切り未達
  let missType = '未達';
  if (aHigh != null && aHigh < r.profit) {
    const aLowCheck = aLow != null ? aLow : aOpen;
    if (aLowCheck != null && aLowCheck > r.loss) {
      missType = 'レンジ内';
    } else {
      missType = '利確届かず';
    }
  }

  return { result: null, pnl: null, filled: true, fillType: '約定', missType };
}

function getEntryMultiplier(nightRise) {
  return nightRise < 0.05 ? 0.97 : nightRise < 0.10 ? 0.98 : 0.99;
}

// ========== エントリー計算 ==========
// スコアベースの倍率でPTS終値から指値を計算
function calcEntry(score, nClose, close) {
  const base = nClose > 0 ? nClose : close;
  const nightRise = close > 0 && nClose > 0 ? (nClose - close) / close : 0;

  // 夜間上昇率ベースの補正
  let nightAdj;
  if (nightRise >= 0.10) nightAdj = 0.95;
  else if (nightRise >= 0.05) nightAdj = 0.97;
  else nightAdj = 0.985; // ④ +0.5%浅くして約定率改善

  // スコア別倍率
  const mulTable = { 6: 0.99, 5: 0.99, 4: 0.985, 3: 0.98, 2: 0.975 };
  const scoreMul = mulTable[score] !== undefined ? mulTable[score] : 0.97;

  // 自動最適化データがあればそちらを優先
  const optRates = calcOptimalEntryRates();
  let multiplier;
  if (optRates[score] !== undefined && isOptimized()) {
    // 学習済み倍率を使用（1 + gap = PTS終値からの倍率）
    multiplier = 1 + optRates[score];
    multiplier = clamp(multiplier, 0.95, 1.0);
  } else {
    multiplier = Math.min(scoreMul, nightAdj);
  }

  const minEntry = base * 0.95;
  let entry = Math.max(base * multiplier, minEntry);
  entry = Math.floor(entry);

  return { entry, multiplier: Math.round(multiplier * 1000) / 1000 };
}

function calcMetrics(close, high, low, open, vr, nOpen, nHigh, nLow, nClose, nVol) {
  const nightRise     = close > 0 && nClose > 0 ? (nClose - close) / close : 0;
  const nightRangeRate= close > 0 && nHigh > 0 && nLow > 0 ? (nHigh - nLow) / close : 0;
  const nRange        = nHigh - nLow;
  const nightClosePos = nRange > 0 ? safeDiv(nClose - nLow, nRange) : 0.5;
  const dRange        = high - low;
  const closePos      = dRange > 0 ? safeDiv(close - low, dRange) : 0.5;
  const upperWickRate = close > 0 ? safeDiv(high - close, close) : 0;
  const warnFlags     = [];
  if (nVol > 0 && nVol < 20000) warnFlags.push('夜間極薄');
  else if (nVol > 0 && nVol < 50000) warnFlags.push('夜間薄い');
  if (vr > 0 && vr < 0.1)  warnFlags.push('倍率極低');
  else if (vr > 0 && vr < 0.3) warnFlags.push('倍率低い');
  return { nightRise, nightRangeRate, nightClosePos, closePos, upperWickRate, warnFlags };
}

function calcFullScore(close, high, low, open, vol, vr, nOpen, nHigh, nLow, nClose, nVol) {
  const m = calcMetrics(close, high, low, open, vr, nOpen, nHigh, nLow, nClose, nVol);
  const { nightRise, nightRangeRate, nightClosePos, closePos, upperWickRate, warnFlags } = m;

  const isExcluded = nightRise >= 0.15 || close <= 50;
  const excludeReason = nightRise >= 0.15 ? '夜間過熱' : close <= 50 ? '超低価格株' : '';

  let score = 0;
  // 加点
  if (low > 0 && (close - low) / low > 0.03) score++;   // ギャップアップ
  if (open > 0 && close > open) score++;                  // 陽線
  if (vol > 500000) score++;                              // 出来高急増
  if (vr >= 5) score += 2; else if (vr >= 2) score++;    // 出来高倍率
  if (nightRise > 0.01 && !isExcluded) score++;           // 夜間上昇
  if (nHigh > 0 && nOpen > 0 && (nHigh-nOpen)/nOpen > 0.01 && !isExcluded) score++; // 夜間強い
  if (high > 0 && nHigh > 0 && nHigh > high) score++;    // 高値更新
  if (nightRangeRate >= 0.05) score++;                    // 夜間レンジ率
  if (nightClosePos >= 0.7) score++;                      // 夜間終値位置高
  if (closePos >= 0.7) score++;                           // 東証終値位置高
  if (upperWickRate < 0.02 && high > 0) score++;          // 上ヒゲ短い
  // 減点
  if (nVol > 0 && nVol < 20000) score -= 2;
  else if (nVol > 0 && nVol < 50000) score--;
  if (vr > 0 && vr < 0.1) score -= 2;
  else if (vr > 0 && vr < 0.3) score--;
  if (nightRangeRate > 0 && nightRangeRate < 0.02) score--;
  if (nightClosePos < 0.3 && nHigh !== nLow) score--;
  if (closePos < 0.3 && high !== low) score--;
  if (upperWickRate >= 0.10) score -= 2;
  else if (upperWickRate >= 0.05) score--;

  score = clamp(score, 0, 5); // まず0〜5点に制限

  // 6点昇格条件：必須4条件 + 追加2条件以上
  const req1 = vol > 500000;                          // 出来高急増
  const req2 = nightRise > 0.01 && !isExcluded;       // 夜間上昇
  const req3 = nightClosePos >= 0.7;                   // 夜間終値位置70%以上
  const req4 = upperWickRate < 0.02 && high > 0;       // 上ヒゲ短い

  const opt1 = high > 0 && nHigh > 0 && nHigh > high; // 高値更新
  const opt2 = nightRangeRate >= 0.05;                 // 夜間レンジ率5%以上
  const opt3 = vr >= 2;                                // 出来高倍率2倍以上
  const optCount = [opt1, opt2, opt3].filter(Boolean).length;

  if (req1 && req2 && req3 && req4 && optCount >= 2) {
    score = 6; // 6点昇格
  }

  return { score, isExcluded, excludeReason, warnFlags, ...m };
}

// ========== スコア計算 ==========
function calcScore() {
  const close  = parseFloat(document.getElementById('f_close').value) || 0;
  const open   = parseFloat(document.getElementById('f_open').value) || 0;
  const high   = parseFloat(document.getElementById('f_high').value) || 0;
  const low    = parseFloat(document.getElementById('f_low').value) || 0;
  const vol    = parseFloat(document.getElementById('f_vol').value) || 0;
  const vr     = parseFloat(document.getElementById('f_volRatio').value) || 0;
  const nOpen  = parseFloat(document.getElementById('f_nOpen').value) || 0;
  const nHigh  = parseFloat(document.getElementById('f_nHigh').value) || 0;
  const nLow   = parseFloat(document.getElementById('f_nLow').value) || 0;
  const nClose = parseFloat(document.getElementById('f_nClose').value) || 0;
  const nVol   = parseFloat(document.getElementById('f_nVol').value) || 0;

  if (!close) {
    document.getElementById('scoreNum').textContent = '—';
    document.getElementById('scoreVerdict').textContent = '終値を入力してください';
    document.getElementById('scoreVerdict').style.color = 'var(--muted)';
    document.getElementById('p_entry').textContent = '—';
    document.getElementById('p_profit').textContent = '—';
    document.getElementById('p_loss').textContent = '—';
    document.getElementById('flagsArea').innerHTML = '';
    return;
  }

  const R = calcFullScore(close, high, low, open, vol, vr, nOpen, nHigh, nLow, nClose, nVol);
  const { score, isExcluded, excludeReason, warnFlags, nightRise, nightRangeRate, nightClosePos, closePos, upperWickRate } = R;

  // フラグ表示
  const flagDefs = [
    { on: low > 0 && (close-low)/low > 0.03, label: '📈 ギャップアップ' },
    { on: open > 0 && close > open, label: '🕯 陽線' },
    { on: vol > 500000, label: '💥 出来高急増' },
    { on: vr >= 5, label: '🔥 前日比' + vr.toFixed(1) + '倍' },
    { on: vr >= 2 && vr < 5, label: '📊 前日比' + vr.toFixed(1) + '倍' },
    { on: nightRise > 0.01 && !isExcluded, label: '🌙 夜間+' + (nightRise*100).toFixed(1) + '%' },
    { on: nHigh > 0 && nOpen > 0 && (nHigh-nOpen)/nOpen > 0.01 && !isExcluded, label: '🚀 夜間強い' },
    { on: high > 0 && nHigh > 0 && nHigh > high, label: '📊 高値更新' },
    { on: nightRangeRate >= 0.05, label: '📐 夜間レンジ' + (nightRangeRate*100).toFixed(1) + '%' },
    { on: nightClosePos >= 0.7, label: '🔝 夜間高値圏' + Math.round(nightClosePos*100) + '%' },
    { on: closePos >= 0.7, label: '🔝 終値高値圏' + Math.round(closePos*100) + '%' },
    { on: upperWickRate < 0.02 && high > 0, label: '✂️ 上ヒゲ短い' },
    { on: upperWickRate >= 0.05, label: '⬆️ 上ヒゲ' + (upperWickRate*100).toFixed(1) + '%', warn: true },
    { on: nightRangeRate > 0 && nightRangeRate < 0.02, label: '😴 夜間レンジ狭い', warn: true },
    { on: nightClosePos < 0.3 && nHigh !== nLow, label: '📉 夜間安値引け', warn: true },
    { on: closePos < 0.3 && high !== low, label: '📉 安値引け', warn: true },
    { on: warnFlags.includes('夜間極薄'), label: '⚠️ 夜間極薄', warn: true },
    { on: warnFlags.includes('夜間薄い') && !warnFlags.includes('夜間極薄'), label: '⚠️ 夜間薄い', warn: true },
    { on: warnFlags.includes('倍率極低'), label: '⚠️ 倍率極低', warn: true },
    { on: warnFlags.includes('倍率低い') && !warnFlags.includes('倍率極低'), label: '⚠️ 倍率低い', warn: true },
  ];

  document.getElementById('flagsArea').innerHTML = flagDefs
    .filter(f => f.on)
    .map(f => '<div class="flag ' + (isExcluded ? 'excluded' : f.warn ? 'off' : 'on') + '">' + f.label + '</div>')
    .join('') + (isExcluded ? '<div class="flag excluded">⚠️ ' + excludeReason + '・除外</div>' : '');

  if (isExcluded) {
    document.getElementById('scoreNum').textContent = '×';
    document.getElementById('scoreNum').className = 'score-num s0';
    document.getElementById('scoreVerdict').textContent = excludeReason + ' → エントリー禁止';
    document.getElementById('scoreVerdict').style.color = 'var(--warn)';
    document.getElementById('p_entry').textContent = '除外';
    document.getElementById('p_profit').textContent = '—';
    document.getElementById('p_loss').textContent = '—';
    return;
  }

  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreNum').className = 'score-num s' + Math.min(score, 4);

  const verdicts = ['見送り','弱い','検討','有望✓','強い✓✓','超強い!!!','完璧!!!'];
  const colors   = ['var(--muted)','var(--warn)','var(--gold)','var(--accent2)','var(--accent2)','var(--accent2)','var(--accent2)'];
  document.getElementById('scoreVerdict').textContent = verdicts[score] || '超強い';
  document.getElementById('scoreVerdict').style.color = colors[score] || 'var(--accent2)';

  // エントリー計算（スコアベース＋最低値幅補正）
  const { entry, multiplier } = calcEntry(score, nClose, close);
  const profitRate = getProfitRate(score);
  let profit = Math.round(entry * (1 + profitRate));
  let loss   = Math.round(entry * 0.965);
  if (profit - entry < 1) profit = entry + 1;
  if (entry - loss  < 1) loss   = entry - 1;

  document.getElementById('p_entry').textContent  = '¥' + entry;
  document.getElementById('p_profit').textContent = '¥' + profit;
  document.getElementById('p_loss').textContent   = '¥' + loss;
  document.getElementById('p_entrySub').textContent  = 'PTS×' + multiplier;
  document.getElementById('p_profitSub').textContent = isOptimized() ? '📊+' + Math.round(profitRate*100) + '%' : '+3%';
}

// ========== 記録保存 ==========
function saveRecord() {
  const code  = document.getElementById('f_code').value.trim();
  const date  = document.getElementById('f_date').value;
  const close = parseFloat(document.getElementById('f_close').value) || 0;

  if (!code || !close) { showToast('❌ 銘柄コードと終値は必須です'); return; }

  const records = loadRecords();

  // 重複チェック
  const dupIdx = records.findIndex(r => String(r.code) === String(code) && r.date === date);
  if (dupIdx >= 0) {
    if (!confirm(code + '(' + date + ')は既に記録済みです。上書きしますか？')) return;
  }

  const open   = parseFloat(document.getElementById('f_open').value) || 0;
  const high   = parseFloat(document.getElementById('f_high').value) || 0;
  const low    = parseFloat(document.getElementById('f_low').value) || 0;
  const vol    = parseFloat(document.getElementById('f_vol').value) || 0;
  const vr     = parseFloat(document.getElementById('f_volRatio').value) || 0;
  const nOpen  = parseFloat(document.getElementById('f_nOpen').value) || 0;
  const nHigh  = parseFloat(document.getElementById('f_nHigh').value) || 0;
  const nLow   = parseFloat(document.getElementById('f_nLow').value) || 0;
  const nClose = parseFloat(document.getElementById('f_nClose').value) || 0;
  const nVol   = parseFloat(document.getElementById('f_nVol').value) || 0;
  const name   = document.getElementById('f_name').value.trim();

  const R = calcFullScore(close, high, low, open, vol, vr, nOpen, nHigh, nLow, nClose, nVol);
  const { score, isExcluded, excludeReason, warnFlags, nightRise, nightRangeRate, nightClosePos, closePos, upperWickRate } = R;

  const { entry, multiplier: entryMultiplier } = calcEntry(score, nClose, close);
  const profitRate = getProfitRate(score);
  let profit   = Math.round(entry * (1 + profitRate));
  let loss     = Math.round(entry * 0.965);
  if (profit - entry < 1) profit = entry + 1;
  if (entry - loss  < 1) loss   = entry - 1;

  const record = {
    id: Date.now(),
    code, date, name,
    open, high, low, close, vol, vr,
    nOpen, nHigh, nLow, nClose, nVol,
    score, entry, profit, loss, profitRate, entryMultiplier,
    isExcluded, excludeReason, warnFlags,
    nightRise, nightRangeRate, nightClosePos, closePos, upperWickRate,
    actualOpen: null, actualHigh: null, actualLow: null,
    result: null, pnl: null, missType: '未入力'
  };

  if (dupIdx >= 0) {
    record.actualOpen  = records[dupIdx].actualOpen;
    record.actualHigh  = records[dupIdx].actualHigh;
    record.actualLow   = records[dupIdx].actualLow;
    record.result      = records[dupIdx].result;
    record.pnl         = records[dupIdx].pnl;
    record.missType    = records[dupIdx].missType ?? '未入力';
    records[dupIdx] = record;
  } else {
    records.unshift(record);
  }

  saveAll(records);
  clearForm();
  showToast('✅ 記録しました！');
  renderAll();
}

// ========== 貼り付け自動入力 ==========
function doPaste() {
  const text = document.getElementById('pasteBox').value.trim();
  if (!text) { showToast('❌ テキストを入力してください'); return; }

  // ---または空行で分割
  const blocks = text.split(/\n---+\n?|\n{2,}(?=銘柄コード)/).map(b => b.trim()).filter(b => b.length > 0);
  let count = 0;

  blocks.forEach(block => {
    block = block.trim();
    if (!block) return;

    const getVal = (keys) => {
      for (const key of keys) {
        const m = block.match(new RegExp(key + '[：:]\\s*([\\d\\.]+)', 'i'));
        if (m) return m[1];
      }
      return '';
    };
    const getName = () => {
      const m = block.match(/銘柄名[：:]\s*(.+)/);
      return m ? m[1].trim() : '';
    };

    const code = getVal(['銘柄コード']);
    if (!code) return;

    // 日付があればセット
    const dateMatch = block.match(/日付[：:]\s*([\d\-\/]+)/);
    if (dateMatch) {
      document.getElementById('f_date').value = dateMatch[1].replace(/\//g, '-');
    }

    document.getElementById('f_code').value      = code;
    document.getElementById('f_name').value      = getName();
    document.getElementById('f_open').value      = getVal(['始値']);
    document.getElementById('f_high').value      = getVal(['高値']);
    document.getElementById('f_low').value       = getVal(['安値']);
    document.getElementById('f_close').value     = getVal(['終値']);
    document.getElementById('f_vol').value       = getVal(['売買代金']);
    document.getElementById('f_volRatio').value  = getVal(['出来高倍率']);
    document.getElementById('f_nOpen').value     = getVal(['夜間始値']);
    document.getElementById('f_nHigh').value     = getVal(['夜間高値']);
    document.getElementById('f_nLow').value      = getVal(['夜間安値']);
    document.getElementById('f_nClose').value    = getVal(['夜間終値']);
    document.getElementById('f_nVol').value      = getVal(['夜間代金']);

    calcScore();

    // 常にサイレント保存（confirmなし）
    const c = document.getElementById('f_close').value;
    const cd = document.getElementById('f_code').value;
    if (cd && c) {
      saveRecordSilent();
      count++;

function saveRecordSilent() {
  const code  = document.getElementById('f_code').value.trim();
  const date  = document.getElementById('f_date').value;
  const close = parseFloat(document.getElementById('f_close').value) || 0;
  if (!code || !close) return;

  const records = loadRecords();
  const dupIdx = records.findIndex(r => String(r.code) === String(code) && r.date === date);

  const open   = parseFloat(document.getElementById('f_open').value) || 0;
  const high   = parseFloat(document.getElementById('f_high').value) || 0;
  const low    = parseFloat(document.getElementById('f_low').value) || 0;
  const vol    = parseFloat(document.getElementById('f_vol').value) || 0;
  const vr     = parseFloat(document.getElementById('f_volRatio').value) || 0;
  const nOpen  = parseFloat(document.getElementById('f_nOpen').value) || 0;
  const nHigh  = parseFloat(document.getElementById('f_nHigh').value) || 0;
  const nLow   = parseFloat(document.getElementById('f_nLow').value) || 0;
  const nClose = parseFloat(document.getElementById('f_nClose').value) || 0;
  const nVol   = parseFloat(document.getElementById('f_nVol').value) || 0;
  const name   = document.getElementById('f_name').value.trim();

  const R = calcFullScore(close, high, low, open, vol, vr, nOpen, nHigh, nLow, nClose, nVol);
  const { score, isExcluded, excludeReason, warnFlags, nightRise, nightRangeRate, nightClosePos, closePos, upperWickRate } = R;

  const { entry, multiplier: entryMultiplier } = calcEntry(score, nClose, close);
  const profitRate = getProfitRate(score);
  let profit   = Math.round(entry * (1 + profitRate));
  let loss     = Math.round(entry * 0.965);
  if (profit - entry < 1) profit = entry + 1;
  if (entry - loss  < 1) loss   = entry - 1;

  const rec = {
    id: dupIdx >= 0 ? records[dupIdx].id : Date.now(),
    code, date, name, open, high, low, close, vol, vr,
    nOpen, nHigh, nLow, nClose, nVol,
    score, entry, profit, loss, profitRate, entryMultiplier,
    isExcluded, excludeReason, warnFlags,
    nightRise, nightRangeRate, nightClosePos, closePos, upperWickRate,
    actualOpen: dupIdx >= 0 ? records[dupIdx].actualOpen : null,
    actualHigh: dupIdx >= 0 ? records[dupIdx].actualHigh : null,
    actualLow:  dupIdx >= 0 ? records[dupIdx].actualLow  : null,
    result:     dupIdx >= 0 ? records[dupIdx].result     : null,
    pnl:        dupIdx >= 0 ? records[dupIdx].pnl        : null,
    missType:   dupIdx >= 0 ? (records[dupIdx].missType ?? '未入力') : '未入力',
  };

  if (dupIdx >= 0) records[dupIdx] = rec;
  else records.unshift(rec);
  saveAll(records);
}

// ========== 結果貼り付け ==========
function doResultPaste() {
  const text = document.getElementById('resultPasteBox').value.trim();
  if (!text) { showToast('❌ テキストを入力してください'); return; }

  const toNum = (v) => {
    if (v == null) return null;
    const s = String(v).replace(/[　 ，,]/g,'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[．]/g,'.').replace(/[－−]/g,'-');
    const n = parseFloat(s);
    return isNaN(n) ? null : n;
  };

  const records = loadRecords();
  let updated = 0;

  const blocks = text.split(/\n?---+\n?|\n{2,}(?=銘柄コード)/).map(b => b.trim()).filter(b => b.length > 0);

  blocks.forEach(block => {
    const getVal = (keys) => {
      for (const key of keys) {
        const m = block.match(new RegExp(key + '[：:]\\s*([\\d\\.,．０-９]+)', 'i'));
        if (m) return toNum(m[1]);
      }
      return null;
    };

    const codeMatch = block.match(/銘柄コード[：:]\s*(\d+)/);
    if (!codeMatch) return;
    const codeStr = codeMatch[1].trim();

    const dateMatch = block.match(/日付[：:]\s*([\d\-\/]+)/);
    // 日付を YYYY-MM-DD 形式に正規化
    const normalizeDate = (d) => d ? d.replace(/\//g, '-') : null;
    const dateStr = normalizeDate(dateMatch ? dateMatch[1].trim() : null);

    const aOpen = getVal(['寄り付き','実際の寄り付き','始値','始']);
    const aHigh = getVal(['高値','当日高値']);
    const aLow  = getVal(['安値','当日安値']);

    if (aOpen === null && aHigh === null && aLow === null) return;

    // 日付なしの場合は最新1件のみ（候補を先に絞る）
    let candidates = records
      .map((r, idx) => ({ r, idx }))
      .filter(({ r }) => String(r.code).trim() === codeStr);

    if (dateStr) {
      candidates = candidates.filter(({ r }) => r.date.replace(/\//g, '-') === dateStr);
    } else {
      // 日付なしは先頭1件のみ
      candidates = candidates.slice(0, 1);
    }

    candidates.forEach(({ idx }) => {
      if (aOpen !== null) records[idx].actualOpen = aOpen;
      if (aHigh !== null) records[idx].actualHigh = aHigh;
      if (aLow  !== null) records[idx].actualLow  = aLow;

      // 共通判定関数で統一
      const j = judgeResult(records[idx]);
      records[idx].result   = j.result;
      records[idx].pnl      = j.pnl;
      records[idx].filled   = j.filled;
      records[idx].fillType = j.fillType;
      records[idx].missType = j.missType;
      updated++;
    });
  });

  if (updated > 0) {
    saveAll(records);
    document.getElementById('resultPasteBox').value = '';
    const done = records.filter(r => r.result === '勝' || r.result === '負').length;
    const saved = records.filter(r => !r.result && (r.actualOpen != null || r.actualHigh != null || r.actualLow != null)).length;
    showToast('✅ ' + updated + '件更新 / 決着:' + done + '件 未達:' + saved + '件');
    renderAll();
  } else {
    showToast('❌ 一致する記録が見つかりません');
  }
}

      .replace(/[　 ，,]/g, '')

      .replace(/[－−]/g, '-');
    const n = parseFloat(v);
    return isNaN(n) ? null : n;
  };

  records[idx].pnl      = j.pnl;
  records[idx].filled   = j.filled;
  records[idx].fillType = j.fillType;
  records[idx].missType = j.missType;

  const verify = loadRecords().filter(r => !r.isExcluded);
  const cntFilled   = verify.filter(r => r.filled === true).length;
  const cntUnfilled = verify.filter(r => r.filled === false && r.fillType === '未約定').length;
  const cntDone     = verify.filter(r => r.result === '勝' || r.result === '負').length;

function calcGroupStats(records) {
  const all      = records.filter(r => !r.isExcluded);
  const filled   = all.filter(r => r.filled === true);
  const done     = all.filter(r => r.result === '勝' || r.result === '負');
  const wins     = done.filter(r => r.result === '勝');
  const missNone = all.filter(r => r.missType === '刺さらず').length;
  const missRange= all.filter(r => r.missType === 'レンジ内').length;
  const missProfit=all.filter(r => r.missType === '利確届かず').length;
  const fillRate = all.length ? Math.round(filled.length / all.length * 100) : 0;
  const winRate  = done.length ? Math.round(wins.length / done.length * 100) : null;

  // EV計算
  const evRecs = all.filter(r => r.filled === true);
  let ev = null;
  if (done.length >= 3) {
    const avgWin  = wins.length ? wins.reduce((s,r) => s + parseFloat(r.pnl||0), 0) / wins.length : 0;
    const avgLoss = done.filter(r=>r.result==='負').length
      ? Math.abs(done.filter(r=>r.result==='負').reduce((s,r) => s + parseFloat(r.pnl||0), 0) / done.filter(r=>r.result==='負').length) : 0;
    ev = (wins.length/done.length) * avgWin - (done.filter(r=>r.result==='負').length/done.length) * avgLoss;
  }

  return { total: all.length, filled: filled.length, fillRate, winRate, ev, missNone, missRange, missProfit, done: done.length, wins: wins.length };
}

function renderComparison() {
  const dateVal = document.getElementById('releaseDate').value.replace(/\//g, '-');
  const area = document.getElementById('comparisonArea');
  if (!dateVal) { area.innerHTML = '<div style="color:var(--muted);font-size:12px;">解放日を入力してください</div>'; return; }

  const records = loadRecords();
  const before = records.filter(r => r.date < dateVal);
  const after  = records.filter(r => r.date >= dateVal);

  if (!before.length && !after.length) { area.innerHTML = '<div style="color:var(--muted);font-size:12px;">データがありません</div>'; return; }

  const bStat = calcGroupStats(before);
  const aStat = calcGroupStats(after);

  const diff = (a, b, unit='%') => {
    if (a === null || b === null) return '';
    const d = a - b;
    const col = d > 0 ? 'var(--accent2)' : d < 0 ? 'var(--warn)' : 'var(--muted)';
    return `<span style="color:${col};font-size:10px;">${d > 0 ? '▲' : d < 0 ? '▼' : '─'}${Math.abs(d).toFixed(d%1===0?0:1)}${unit}</span>`;
  };

  const row = (label, bVal, aVal, unit='%') => `
    <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:4px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
      <div style="color:var(--muted)">${label}</div>
      <div style="text-align:center;font-family:'JetBrains Mono',monospace;">${bVal !== null ? bVal + unit : '—'}</div>
      <div style="text-align:center;font-family:'JetBrains Mono',monospace;">${aVal !== null ? aVal + unit : '—'}</div>
      <div style="text-align:center;">${diff(aVal, bVal, unit)}</div>
    </div>`;

  // スコア別比較
  let scoreRows = '';
  for (let s = 6; s >= 1; s--) {
    const bGrp = calcGroupStats(before.filter(r => r.score === s));
    const aGrp = calcGroupStats(after.filter(r => r.score === s));
    if (!bGrp.total && !aGrp.total) continue;
    scoreRows += row(s + '点', bGrp.winRate, aGrp.winRate);
  }

  area.innerHTML = `
    <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:4px;margin-bottom:6px;">
      <div style="font-size:10px;color:var(--muted);">項目</div>
      <div style="text-align:center;font-size:10px;color:var(--muted);">解放前<br>${bStat.total}件</div>
      <div style="text-align:center;font-size:10px;color:var(--accent2);">解放後<br>${aStat.total}件</div>
      <div style="text-align:center;font-size:10px;color:var(--muted);">変化</div>
    </div>
    ${row('約定率', bStat.fillRate, aStat.fillRate)}
    ${row('勝率', bStat.winRate, aStat.winRate)}
    ${row('EV', bStat.ev !== null ? bStat.ev.toFixed(1) : null, aStat.ev !== null ? aStat.ev.toFixed(1) : null)}
    ${row('刺さらず', bStat.missNone, aStat.missNone, '件')}
    ${row('レンジ内', bStat.missRange, aStat.missRange, '件')}
    ${row('利確届かず', bStat.missProfit, aStat.missProfit, '件')}
    <div style="font-size:11px;font-weight:700;color:var(--muted);margin:10px 0 4px;">📊 スコア別勝率</div>
    <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:4px;margin-bottom:4px;">
      <div style="font-size:10px;color:var(--muted);">スコア</div>
      <div style="text-align:center;font-size:10px;color:var(--muted);">解放前</div>
      <div style="text-align:center;font-size:10px;color:var(--accent2);">解放後</div>
      <div style="text-align:center;font-size:10px;color:var(--muted);">変化</div>
    </div>
    ${scoreRows || '<div style="color:var(--muted);font-size:11px;">データ不足</div>'}
  `;
}

  records.forEach(r=>{
    if (!byCode[r.code]) byCode[r.code]={name:r.name,dates:[]};
    if (!byCode[r.code].dates.includes(r.date)) byCode[r.code].dates.push(r.date);
  });
  return Object.entries(byCode).filter(([,d])=>d.dates.length>=2).map(([code,d])=>({code,name:d.name,dates:d.dates.sort(),count:d.dates.length}));
}

async function runMaterialCheck(code,name,nVol,nightRise) {
  const btn=document.getElementById('matBtn_'+code); if (btn) btn.disabled=true;
  const box=document.getElementById('matBox_'+code);
  const content=document.getElementById('matContent_'+code);
  if (box) box.classList.add('visible');
  if (content) content.innerHTML='<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  const prompt=`あなたは日本株の短期トレード判断支援AIです。
銘柄コード：${code}、銘柄名：${name||'不明'}
夜間上昇率（直近）：約${(nightRise*100).toFixed(1)}%
夜間代金：${nVol}千円

夜間PTSランキングに2日以上連続でランクインしています。
web検索で最新情報を調べて以下を分析してください：
1. 材料の有無（IR・適時開示・ニュース）
2. 材料の継続性
3. 出来高の維持状況

【出力フォーマット】
判定：保有OK / 注意 / 見送り
・[根拠1]
・[根拠2]
注意事項：[あれば]`;
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=data.content?.map(c=>c.type==='text'?c.text:'').filter(Boolean).join('')||'情報取得できませんでした';
    if (content) content.textContent=text;
  } catch(e) { if (content) content.textContent='エラーが発生しました。'; }
  if (btn) btn.disabled=false;
}

function resultBadge(r) {
  if (r.isExcluded) return '<span class="badge badge-excluded">⚠️ 除外</span>';
  if (r.result === '勝') return '<span class="badge badge-win">🟢 勝</span>';
  if (r.result === '負') return '<span class="badge badge-lose">🔴 負</span>';
  const mt = r.missType ?? '未入力';
  const ft = r.fillType ?? '';
  // 未約定（安値がエントリーに届かなかった）
  if (ft === '未約定' || mt === '刺さらず') return '<span class="badge badge-pending">⚪ 未約定</span>';
  // 約定済み未達
  if (mt === '利確届かず') return '<span class="badge" style="background:rgba(255,215,0,0.15);color:var(--gold);border:1px solid rgba(255,215,0,0.3);">🟡 利確届かず</span>';
  if (mt === 'レンジ内')   return '<span class="badge" style="background:rgba(255,215,0,0.15);color:var(--gold);border:1px solid rgba(255,215,0,0.3);">🟡 レンジ内</span>';
  if (mt === '未達')       return '<span class="badge" style="background:rgba(255,215,0,0.15);color:var(--gold);border:1px solid rgba(255,215,0,0.3);">🟡 未達</span>';
  return '<span class="badge badge-pending">⚪ 未入力</span>';
}

function renderStats() {
  const records  = loadRecords();
  const all      = records.filter(r => !r.isExcluded);
  const filled   = all.filter(r => r.filled === true || (r.fillType === '約定'));
  const unfilled = all.filter(r => r.fillType === '未約定' || r.missType === '刺さらず');
  const done     = all.filter(r => r.result === '勝' || r.result === '負');
  const wins     = done.filter(r => r.result === '勝');
  const losses   = done.filter(r => r.result === '負');
  const pending  = filled.filter(r => !r.result); // 約定済み未達
  const untouched= all.filter(r => !r.fillType || r.fillType === '未入力' || (!r.actualOpen && !r.actualHigh && !r.actualLow));
  const excl     = records.filter(r => r.isExcluded);
  // 勝率・EVは約定済みで勝負がついたもののみ
  const wr       = done.length ? Math.round(wins.length / done.length * 100) : null;
  const wrColor  = wr === null ? 'var(--accent)' : wr >= 60 ? 'var(--accent2)' : wr < 40 ? 'var(--warn)' : 'var(--gold)';

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-box">
      <div class="stat-label">総記録数</div>
      <div class="stat-val">${records.length}</div>
      <div class="stat-sub">約定${filled.length} 未約定${unfilled.length} 未入力${untouched.length} 除外${excl.length}</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">勝率（約定確定）</div>
      <div class="stat-val" style="color:${wrColor}">${wr !== null ? wr + '%' : '—'}</div>
      <div class="stat-sub">${wins.length}勝 ${losses.length}負 ${pending.length}未達</div>
    </div>
  `;

  // 自動最適化進捗（未達含む入力済み件数）
  const progressCount = all.filter(r =>
    r.actualOpen != null || r.actualHigh != null || r.actualLow != null
  ).length;
  const pct = Math.min(progressCount / 30 * 100, 100);
  const remain = Math.max(30 - progressCount, 0);
  const MIN_DATA = 30;

  let statsHtml = '';
  if (progressCount < MIN_DATA) {
    statsHtml += `<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">🔒 自動最適化まで ${remain}件（入力済み${progressCount}件）</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  } else {
    const optRates = calcOptimalProfitRates();
    const rateStr = [6,5,4,3,2,1,0]
      .filter(s => optRates[s] !== undefined)
      .map(s => s + '点:+' + Math.round(optRates[s]*100) + '%')
      .join(' / ');
    statsHtml += `<div style="font-size:11px;color:var(--accent2);margin-bottom:8px;font-weight:700;">🤖 自動最適化 稼働中（中央値ベース）</div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:8px;">${rateStr || '集計中...'}</div>`;
  }

  // 未達分類集計
  const missNone   = all.filter(r => !r.result && (r.missType ?? '未入力') === '刺さらず').length;
  const missProfit = all.filter(r => !r.result && (r.missType ?? '') === '利確届かず').length;
  const missRange  = all.filter(r => !r.result && (r.missType ?? '') === 'レンジ内').length;
  const missNone2  = untouched.length;
  if (missNone + missProfit + missRange > 0) {
    statsHtml += `<div style="font-size:11px;color:var(--muted);margin:8px 0 4px;font-weight:700;">📊 未達分析</div>
    <div style="font-size:11px;color:var(--muted);line-height:1.8;">
      🟡 刺さらず：${missNone}件　利確届かず：${missProfit}件　レンジ内：${missRange}件　⚪未入力：${missNone2}件
    </div>`;
  }

  // スコア別（0〜6点）
  const evMap = calcExpectedValues();
  for (let s = 6; s >= 0; s--) {
    const grp  = all.filter(r => r.score === s);
    const dGrp = grp.filter(r => r.result === '勝' || r.result === '負');
    const gW   = dGrp.filter(r => r.result === '勝');
    const gL   = dGrp.filter(r => r.result === '負');
    const gP   = grp.filter(r => !r.result);
    if (!grp.length) continue;
    const wpct = dGrp.length ? Math.round(gW.length / dGrp.length * 100) : 0;
    const bc   = s >= 4 ? 'high' : s >= 2 ? 'mid' : 'low';
    const pillColor = s >= 4 ? 'background:rgba(0,255,159,0.15);color:var(--accent2)' : s >= 2 ? 'background:rgba(255,215,0,0.15);color:var(--gold)' : 'background:rgba(255,107,107,0.15);color:var(--warn)';
    // 期待値表示
    const ev = evMap[s];
    const evStr = ev !== null && ev !== undefined
      ? (ev >= 0 ? '<span style="color:var(--accent2)">EV+' + ev.toFixed(1) + '%</span>' : '<span style="color:var(--warn)">EV' + ev.toFixed(1) + '%</span>')
      : '';
    // 件数不足ガード表示
    const guardStr = s === 0 ? '<span style="color:var(--muted);font-size:9px;">学習除外</span>'
      : isOptimized() && grp.length < 3 ? '<span style="color:var(--warn);font-size:9px;">⚠️件数不足</span>' : '';
    statsHtml += `
      <div class="score-row">
        <div class="score-pill" style="${pillColor}">${s}</div>
        <div class="bar-wrap">
          <div class="bar-labels">
            <span style="font-weight:700">${dGrp.length ? wpct + '%' : '未集計'}</span>
            <span style="color:var(--muted);font-size:10px;">${gW.length}勝${gL.length}負${gP.length}未 ${evStr}${guardStr}</span>
          </div>
          <div class="bar-bg"><div class="bar-fill ${bc}" style="width:${wpct}%"></div></div>
        </div>
        <div class="score-cnt">${grp.length}件</div>
      </div>`;
  }
  document.getElementById('scoreAnalysis').innerHTML = statsHtml || '<div style="color:var(--muted);font-size:12px;padding:12px 0">記録がありません</div>';
  renderConsecutive();
}
function backupData() {
  const records = loadRecords();
  if (!records.length) { showToast('❌ データがありません'); return; }
  const txt = 'TGKV3:' + JSON.stringify(records);
  navigator.clipboard.writeText(txt).then(() => {
    showToast('✅ ' + records.length + '件をコピーしました');
  }).catch(() => {
    document.getElementById('restoreBox').value = txt;
    showToast('✅ 下のテキストをコピーして保存してください');
  });
}

function restoreData() {
  let txt = document.getElementById('restoreBox').value.trim();
  if (!txt) { showToast('❌ テキストを貼り付けてください'); return; }
  try {
    // TGKV3: プレフィックスを除去
    let json = txt.startsWith('TGKV3:') ? txt.slice(6) : txt;

    // 末尾が切れている場合の自動修復
    if (!json.endsWith(']')) {
      // 最後の完全なオブジェクトまでを切り出す
      const lastBrace = json.lastIndexOf('},');
      if (lastBrace > 0) {
        json = json.slice(0, lastBrace + 1) + ']';
      } else if (json.lastIndexOf('}') > 0) {
        json = json.slice(0, json.lastIndexOf('}') + 1) + ']';
      }
    }

    const data = JSON.parse(json);
    if (!Array.isArray(data)) throw new Error();
    saveAll(data);
    document.getElementById('restoreBox').value = '';
    showToast('✅ ' + data.length + '件を復元しました');
    renderAll();
  } catch(e) {
    showToast('❌ 復元失敗。正しいバックアップか確認してください');
  }
}

function dedupeData() {
  const records = loadRecords();
  const seen = new Set();
  const clean = records.filter(r => {
    const key = r.code + '_' + r.date;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  const removed = records.length - clean.length;
  if (!removed) { showToast('✅ 重複データなし'); return; }
  if (confirm(removed + '件の重複を削除しますか？')) {
    saveAll(clean);
    showToast('🧹 ' + removed + '件削除しました');
    renderAll();
  }
}

function exportCSV() {
  const records = loadRecords();
  if (!records.length) { showToast('❌ データがありません'); return; }
  const h = ['日付','コード','銘柄名','始値','高値','安値','終値','売買代金','倍率','夜間始','夜間高','夜間安','夜間終','夜間代金','スコア','エントリー','利確','損切','寄付','当日高','当日安','結果','損益率'];
  const rows = records.map(r => [
    r.date, r.code, r.name ?? '', r.open, r.high, r.low, r.close, r.vol, r.vr,
    r.nOpen, r.nHigh, r.nLow, r.nClose, r.nVol,
    r.score, r.entry, r.profit, r.loss,
    r.actualOpen ?? '', r.actualHigh ?? '', r.actualLow ?? '',
    r.result ?? '', r.pnl ?? ''
  ]);
  const csv = '\uFEFF' + [h,...rows].map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = '低位株_' + today.toISOString().split('T')[0] + '.csv';
  a.click();
  showToast('📥 ダウンロード中...');
}
